<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Vantus — Architecture Map</title>
<style>
  :root{
    --bg:#0F0F0F; --panel:#161616; --panel-2:#1c1c1c; --border:#2a2a2a;
    --text:#e8e8e8; --muted:#8a8a8a;
    --client:#4ea1ff; --route:#7bd389; --service:#c792ea; --db:#ffb86b;
    --external:#ff6b9d; --critical:#ff3860; --accent:#f5b942; --accent-2:#ff7a45;
    --uiapps:#56d4c4;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,sans-serif;overflow:hidden}
  #app{display:flex;height:100vh;width:100vw}
  #stage{flex:1;position:relative;overflow:hidden}
  svg{width:100%;height:100%;display:block;cursor:grab}
  svg.grabbing{cursor:grabbing}

  /* Top bar */
  #top{position:absolute;top:0;left:0;right:0;z-index:5;padding:12px 16px;
    display:flex;gap:8px;flex-wrap:wrap;align-items:center;
    background:linear-gradient(180deg,rgba(15,15,15,.96),rgba(15,15,15,.0))}
  #top h1{font-size:14px;margin:0 14px 0 0;font-weight:700;letter-spacing:.2px}
  #top h1 span{color:var(--muted);font-weight:400}
  #chips{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  .chip{font-size:11.5px;padding:5px 11px;border-radius:20px;border:1px solid var(--border);
    background:var(--panel-2);color:var(--muted);cursor:pointer;user-select:none;white-space:nowrap}
  .chip:hover{color:var(--text);border-color:#3a3a3a}
  .chip.active{background:var(--accent);color:#111;border-color:var(--accent);font-weight:700}
  .chip.bugs.active{background:var(--critical);color:#fff;border-color:var(--critical)}

  /* Zoom controls */
  #zoom{position:absolute;left:14px;bottom:14px;z-index:5;display:flex;gap:6px}
  #zoom button{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);
    background:var(--panel-2);color:var(--text);font-size:16px;cursor:pointer}
  #zoom button:hover{border-color:#3a3a3a}
  #zoom button.wide{width:auto;padding:0 10px;font-size:12px}

  /* Legend */
  #legend{position:absolute;right:14px;bottom:14px;z-index:5;background:rgba(22,22,22,.9);
    border:1px solid var(--border);border-radius:10px;padding:10px 12px;font-size:11px;color:var(--muted)}
  #legend .row{display:flex;align-items:center;gap:7px;margin:3px 0}
  #legend .ln{width:22px;height:0;border-top-width:2.5px;border-top-style:solid}

  /* Sidebar */
  #side{width:380px;min-width:380px;background:var(--panel);border-left:1px solid var(--border);
    padding:18px 18px 40px;overflow-y:auto}
  #side h2{font-size:15px;margin:0 0 2px}
  #side .path{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:11px;color:var(--accent);
    word-break:break-all;margin:0 0 12px}
  #side .lbl{font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);
    margin:16px 0 5px;font-weight:700}
  #side .role{font-size:13px;line-height:1.5}
  #side .plain{font-size:13px;line-height:1.55;color:#cfcfcf;background:var(--panel-2);
    border-left:3px solid var(--client);padding:9px 11px;border-radius:0 8px 8px 0}
  #side ul{margin:6px 0 0;padding-left:16px}
  #side li{font-size:12px;line-height:1.5;margin:3px 0;color:#cdcdcd}
  #side li code{font-family:ui-monospace,Menlo,monospace;font-size:11px;color:var(--accent)}
  .edgepill{display:inline-block;font-size:11px;padding:3px 8px;border-radius:6px;margin:3px 4px 0 0;
    background:var(--panel-2);border:1px solid var(--border)}
  .tag{display:inline-block;font-size:10px;padding:2px 7px;border-radius:5px;margin:2px 4px 0 0;
    background:#222;color:var(--muted);border:1px solid var(--border)}
  .fix{font-size:12px;line-height:1.45;margin:5px 0;padding:6px 9px;border-radius:7px;
    background:rgba(123,211,137,.08);border:1px solid rgba(123,211,137,.25)}
  .fix b{color:var(--route)}
  .bug{font-size:12px;line-height:1.45;margin:5px 0;padding:6px 9px;border-radius:7px;
    background:rgba(255,56,96,.07);border:1px solid rgba(255,56,96,.25)}
  .bug .sev{font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:.06em}
  .sev.high{color:#ff5d7a}.sev.med{color:var(--accent)}.sev.low{color:#7bd389}
  .finding{font-size:12.5px;line-height:1.55;margin:9px 0;padding-left:12px;border-left:2px solid var(--accent-2)}
  .finding b{color:#fff}
  .muted{color:var(--muted)}

  /* Nodes */
  .node{cursor:pointer}
  .node rect.box{transition:opacity .15s}
  .node .nlabel{font-size:12px;font-weight:700;fill:var(--text)}
  .node .nsub{font-size:10px;fill:var(--muted)}
  .node.dim{opacity:.12}
  .edge{transition:opacity .15s}
  .edge.dim{opacity:.05}
  .elabel{font-size:9.5px;fill:#9a9a9a;pointer-events:none}
  .badge-fix circle{fill:#1c3a24;stroke:var(--route)}
  .badge-bug circle{fill:#3a1620;stroke:var(--critical)}
  .badge text{font-size:10px;font-weight:700;fill:#fff;text-anchor:middle}
  .clbl{font-size:12px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;fill:var(--muted)}
  .crit-dot{fill:var(--critical)}
</style>
</head>
<body>

    </div>
    <div id="legend">

      <div class="row"><span class="ln" style="border-color:var(--external)"></span> external API</div>
      <div class="row"><span class="ln" style="border-color:var(--db)"></span> DB read/write</div>
      <div class="row"><span class="ln" style="border-color:var(--client)"></span> entry / mount</div>
      <div class="row"><span class="ln" style="border-color:#555"></span> normal</div>
    </div>
  </div>
  <div id="side"></div>
</div>

  'sync-fns':[{sev:'med',t:'No rateLimit on any sync fn — hammers paid platform APIs'},{sev:'low',t:'sync-instagram declares INSIGHTS_TIMEOUT_MS but never uses it; awaits up to 30 insight calls serially → 26s-timeout risk'}],
  'notify':[{sev:'med',t:'User fields (title, client_note, etc.) interpolated into raw email HTML unescaped (:138-144) — stored/email HTML injection'},{sev:'med',t:'No rateLimit on a function that fans out email/Slack/n8n'}],
  'lib-require-user':[{sev:'med',ref:'CORS',t:'CORS fail-open: unknown origins still execute writes (:26); browser blocks the read but a token-bearing non-browser caller is unaffected'}],
  'oauth-webhooks':[{sev:'med',t:'Deauthorize/data-deletion stubs never verify signatures or delete data — revoked tokens persist; data-deletion returns a fake confirmation code'}],
  'lib-oauth':[{sev:'med',t:'OAuth access/refresh tokens stored in plaintext (:122-135)'}],
  'tbl-account-tokens':[{sev:'med',t:'Tokens unencrypted at rest'}],
  'chat':[{sev:'low',t:'Forwards unvalidated client body to Anthropic — no max_tokens cap or model allowlist (:43)'}],
  'app-root':[{sev:'med',t:'content_items realtime + initial load are not client-scoped (:134,:489); only filtered at render — every browser holds the full multi-tenant set'},{sev:'low',t:'stuckGuard comment says 4s but timeout is 8000ms (:238 vs :269)'},{sev:'low',t:'Dead imports: QuickActionsDashboard/TypingTask/PlaceholderPage/OPS_INIT (:12,:20,:32,:33)'}],
  'tbl-profiles':[{sev:'med',t:'"Service role full access" is an unrestricted FOR ALL USING(true) (:20) — applies to anon/public too'}],
  'tbl-content-items':[{sev:'low',t:'PK is text with no default/format constraint (:25) — drift vs UUID/bigserial tables'}],
  'tbl-oauth-states':[{sev:'low',t:'No cleanup of expired state rows'}],
  'settings-page':[{sev:'low',t:'AI toggles + team invite are display-only with no persistence/backend — misleading UI'}],
  'supabase-client':[{sev:'low',t:'DB_CONNECTED hardcoded true (:14) — the UI offline indicator can never show'}],
  'quick-actions':[{sev:'low',t:'Dead component — imported but never rendered'}],
  'tbl-clients':[{sev:'low',t:'VitalLyfe brand voice/email seeded into the canonical migration set'}],
};

/* Notable findings for the default sidebar */
const FINDINGS = [
  ['Two HIGH schema-drift + broken-write bugs in Competitor Intel','<code>cid_library</code> and <code>cid_performance</code> have no CREATE TABLE migration; <code>CIDPage.jsx</code> writes them via <code>SUPABASE_URL/SUPABASE_KEY</code> that it never imports — clicking "Send to Content Tracker" or "Log Results" throws <code>ReferenceError</code>. The performance write also uses the browser anon key.'],
  ['The headline new feature has a known scoping bug','<code>scrappy_analyze_performance</code> ("Why these won") surfaces reasons across multiple posts and the top set ranks by raw views — it should target the true top performer(s) with one consistent metric. Flagged by the operator; Fix #3.'],
  ['Rate-limit coverage is partial','Only <code>chat.js</code> and <code>agent-action.js</code> call <code>rateLimit</code>. <code>apify-scrape</code> (Apify credits), the three <code>sync-*</code> functions (paid platform APIs), <code>unsplash</code>, and <code>notify</code> (email/Slack/n8n fanout) are ungated.'],
  ['OAuth security debt','Tokens are stored plaintext in <code>connected_account_tokens</code>, and the 6 deauthorize/data-deletion webhooks are unverified no-ops that never delete a revoked token. (The token table\'s service-role-only RLS posture itself is correct.)'],
  ['Dead code located','<code>muse_from_brief</code> handler (no caller), <code>QuickActionsDashboard</code>/<code>TypingTask</code>/<code>PlaceholderPage</code> (imported, never rendered), and an unused <code>OPS_INIT</code> import in App.jsx.'],
  ['Multi-tenant leak risk in realtime','<code>App.jsx</code> subscribes to ALL <code>content_items</code> and filters only at render — every browser receives realtime rows for clients not on screen. Fine for admins today, risky if an external client role reaches the main shell.'],
  ['Model split','Server-side agent actions pin <code>claude-haiku-4-5-20251001</code>; frontend chat callers send <code>claude-sonnet-4-6</code>. Three agent-action handlers inline a duplicate Anthropic fetch instead of the shared <code>ai()</code> — each needs separate edits on a model bump.'],
];

/* ============================ RENDER ============================ */
const SVGNS='http://www.w3.org/2000/svg';
const vp=document.getElementById('vp');
const svg=document.getElementById('svg');
const CCOL={client:'--client',route:'--route',service:'--service',db:'--db',external:'--external',uiapps:'--uiapps'};
const EKIND={critical:'--critical',api:'--accent-2',db:'--db',mount:'--client',normal:'#5a5a5a'};
const cssv=v=>v.startsWith('--')?getComputedStyle(document.documentElement).getPropertyValue(v).trim():v;
const nodeById=Object.fromEntries(nodes.map(n=>[n.id,n]));

function mk(tag,attrs={}){const e=document.createElementNS(SVGNS,tag);for(const k in attrs)e.setAttribute(k,attrs[k]);return e;}

// defs: arrow markers
const defs=mk('defs');
for(const k in EKIND){
  const col=cssv(EKIND[k]);
  const m=mk('marker',{id:'arr-'+k,viewBox:'0 0 10 10',refX:9,refY:5,markerWidth:7,markerHeight:7,orient:'auto-start-reverse'});
  m.appendChild(mk('path',{d:'M0,0 L10,5 L0,10 z',fill:col}));defs.appendChild(m);
}
vp.appendChild(defs);

// clusters
const gC=mk('g');vp.appendChild(gC);
clusters.forEach(c=>{
  const col=cssv(CCOL[c.color]);
  gC.appendChild(mk('rect',{x:c.x,y:c.y,width:c.w,height:c.h,rx:14,fill:col+'10',stroke:col+'33','stroke-width':1}));
  const t=mk('text',{x:c.x+14,y:c.y-10,class:'clbl'});t.textContent=c.label;gC.appendChild(t);
});

// edges
const gE=mk('g');vp.appendChild(gE);
const edgeEls=[];
edges.forEach((e,i)=>{
  const a=nodeById[e.from],b=nodeById[e.to];if(!a||!b)return;
  const x1=a.x+a.w,y1=a.y+a.h/2,x2=b.x,y2=b.y+b.h/2;
  const back=x2<x1; const dx=Math.max(60,Math.abs(x2-x1)*0.5);
  const c1x=back?x1+dx:x1+dx, c2x=back?x2-dx:x2-dx;
  const col=cssv(EKIND[e.kind]);
  const p=mk('path',{d:`M${x1},${y1} C${c1x},${y1} ${c2x},${y2} ${x2},${y2}`,fill:'none',
    stroke:col,'stroke-width':e.kind==='critical'?2.4:1.4,opacity:e.kind==='normal'?.5:.8,
    'marker-end':`url(#arr-${e.kind})`,class:'edge'});
  p._edge=e;gE.appendChild(p);edgeEls.push(p);
  // label
  const mx=(x1+c1x+c2x+x2)/4, my=(y1+y2)/2 + (i%2?-7:7);
  const lt=mk('text',{x:mx,y:my,class:'elabel','text-anchor':'middle'});lt.textContent=e.label;
  lt._edge=e;gE.appendChild(lt);edgeEls.push(lt);
});

// nodes
const gN=mk('g');vp.appendChild(gN);
const nodeEls=[];
nodes.forEach(n=>{
  const col=cssv(CCOL[n.color]);
  const g=mk('g',{class:'node'});g._node=n;
  const r=mk('rect',{x:n.x,y:n.y,width:n.w,height:n.h,rx:10,class:'box',
    fill:cssv('--panel-2'),stroke:n.dead?cssv('--muted'):col,'stroke-width':n.critical?2.4:1.3,
    'stroke-dasharray':n.dead?'4 3':'none'});
  g.appendChild(r);
  const lab=mk('text',{x:n.x+12,y:n.y+21,class:'nlabel'});lab.textContent=n.label;g.appendChild(lab);
  const sub=mk('text',{x:n.x+12,y:n.y+(n.h>52?37:35),class:'nsub'});sub.textContent=n.sub;g.appendChild(sub);
  if(n.critical){g.appendChild(mk('circle',{cx:n.x+n.w-9,cy:n.y+9,r:3.2,class:'crit-dot'}));}
  // badges
  const fc=(FIXES[n.id]||[]).length, bc=(KNOWN_BUGS[n.id]||[]).length;
  let bx=n.x+n.w-12;
  if(bc>0){const bg=mk('g',{class:'badge badge-bug'});bg.appendChild(mk('circle',{cx:bx,cy:n.y+n.h-10,r:8}));
    const t=mk('text',{x:bx,y:n.y+n.h-6.5});t.textContent=bc;bg.appendChild(t);g.appendChild(bg);bx-=20;}
  if(fc>0){const bg=mk('g',{class:'badge badge-fix'});bg.appendChild(mk('circle',{cx:bx,cy:n.y+n.h-10,r:8}));
    const t=mk('text',{x:bx,y:n.y+n.h-6.5});t.textContent=fc;bg.appendChild(t);g.appendChild(bg);}
  gN.appendChild(g);nodeEls.push(g);
  g.addEventListener('mouseenter',()=>!selected&&select(n,true));
  g.addEventListener('mouseleave',()=>!selected&&showDefault());
  g.addEventListener('click',ev=>{ev.stopPropagation();selected=(selected===n)?null:n;selected?select(n):showDefault();applyFilter();});
});

/* ===================== interaction ===================== */
let selected=null, activeFilter='overview';
const side=document.getElementById('side');

function connectedIds(n){
  const s=new Set([n.id]);
  edges.forEach(e=>{if(e.from===n.id)s.add(e.to);if(e.to===n.id)s.add(e.from);});
  return s;
}
function select(n,hover){
  const con=connectedIds(n);
  nodeEls.forEach(g=>g.classList.toggle('dim',!con.has(g._node.id)));
  edgeEls.forEach(el=>{const e=el._edge;el.classList.toggle('dim',!(e.from===n.id||e.to===n.id));});
  renderSidebar(n);
}
function showDefault(){
  if(activeFilter==='overview'||activeFilter==='all'){nodeEls.forEach(g=>g.classList.remove('dim'));edgeEls.forEach(el=>el.classList.remove('dim'));}
  else applyFilter();
  renderIdle();
}

function renderSidebar(n){
  const fixes=FIXES[n.id]||[], bugs=KNOWN_BUGS[n.id]||[];
  const ins=edges.filter(e=>e.to===n.id), outs=edges.filter(e=>e.from===n.id);
  let h=`<h2>${n.label}</h2><div class="path">${n.path||''}</div>`;
  if(n.dead)h+=`<div class="bug"><span class="sev high">dead / drift</span></div>`;
  h+=`<div class="lbl">Role</div><div class="role">${n.role||''}</div>`;
  h+=`<div class="lbl">Plain English</div><div class="plain">${n.plain||''}</div>`;
  if(n.notes&&n.notes.length){h+=`<div class="lbl">Notes</div><ul>`+n.notes.map(x=>`<li>${x.replace(/(:\d+|\b\d{2,4}\b(?=[,\) ]))/g,m=>`<code>${m}</code>`)}</li>`).join('')+`</ul>`;}
  if(bugs.length){h+=`<div class="lbl">Known bugs (${bugs.length})</div>`+bugs.map(b=>`<div class="bug"><span class="sev ${b.sev}">${b.sev}${b.ref?' · '+b.ref:''}</span><br>${b.t}</div>`).join('');}
  if(fixes.length){h+=`<div class="lbl">Fixes (${fixes.length})</div>`+fixes.map(f=>`<div class="fix"><b>#${f.n}</b> ${f.t}</div>`).join('');}
  if(outs.length){h+=`<div class="lbl">Outgoing</div>`+outs.map(e=>`<span class="edgepill">${e.label} → ${nodeById[e.to]?nodeById[e.to].label:e.to}</span>`).join('');}
  if(ins.length){h+=`<div class="lbl">Incoming</div>`+ins.map(e=>`<span class="edgepill">${nodeById[e.from]?nodeById[e.from].label:e.from} · ${e.label}</span>`).join('');}
  if(n.tag){h+=`<div class="lbl">Tags</div>`+n.tag.filter(t=>t!=='all').map(t=>`<span class="tag">${t}</span>`).join('');}
  side.innerHTML=h;
}
function renderDefaultSidebar(){
  let h=`<h2>Vantus</h2><div class="path">content-ops dashboard · React 19 + Vite · Supabase · Netlify Functions</div>`;
  h+=`<div class="lbl">Notable findings from this map</div>`;
  h+=FINDINGS.map(f=>`<div class="finding"><b>${f[0]}</b><br>${f[1]}</div>`).join('');
  h+=`<div class="lbl">How to read this</div><div class="role" style="font-size:12.5px;color:#cdcdcd">Hover a node for its role + plain English + bugs/fixes. Click to pin it and dim everything unconnected. Green badge = fix count, red = bug count. Use the chips up top to isolate a feature, the critical path, or just the buggy nodes.</div>`;
  h+=`<div class="lbl">Clusters</div><ul>`+clusters.map(c=>`<li><b>${c.label}</b></li>`).join('')+`</ul>`;
  side.innerHTML=h;
}
function renderBugsSidebar(){
  const all=[];for(const id in KNOWN_BUGS){KNOWN_BUGS[id].forEach(b=>all.push({...b,node:id}));}
  const c={high:0,med:0,low:0};all.forEach(b=>c[b.sev]++);
  const fixNums=new Set();for(const id in FIXES){FIXES[id].forEach(f=>fixNums.add(f.n));}
  const SEV={high:'🔴 High',med:'🟡 Med',low:'🟢 Low'};
  let h=`<h2>Bugs &amp; Roadmap</h2><div class="path">${all.length} bugs across ${Object.keys(KNOWN_BUGS).length} nodes · ${fixNums.size} numbered fixes</div>`;
  h+=`<div class="lbl">Count by severity</div>`;
  h+=`<div style="display:flex;gap:8px;margin-top:4px">
    <div style="flex:1;background:rgba(255,93,122,.1);border:1px solid rgba(255,93,122,.3);border-radius:10px;padding:10px;text-align:center"><div style="font-size:24px;font-weight:800;color:#ff5d7a">${c.high}</div><div style="font-size:10px;color:var(--muted)">HIGH</div></div>
    <div style="flex:1;background:rgba(245,185,66,.1);border:1px solid rgba(245,185,66,.3);border-radius:10px;padding:10px;text-align:center"><div style="font-size:24px;font-weight:800;color:var(--accent)">${c.med}</div><div style="font-size:10px;color:var(--muted)">MED</div></div>
    <div style="flex:1;background:rgba(123,211,137,.1);border:1px solid rgba(123,211,137,.3);border-radius:10px;padding:10px;text-align:center"><div style="font-size:24px;font-weight:800;color:#7bd389">${c.low}</div><div style="font-size:10px;color:var(--muted)">LOW</div></div>
  </div>`;
  ['high','med','low'].forEach(sev=>{
    const items=all.filter(b=>b.sev===sev);if(!items.length)return;
    h+=`<div class="lbl">${SEV[sev]} (${items.length})</div>`;
    items.forEach(b=>{const n=nodeById[b.node];
      h+=`<div class="bug"><span class="sev ${b.sev}">${n?n.label:b.node}${b.ref?' · '+b.ref:''}</span><br>${b.t}</div>`;});
  });
  h+=`<div class="lbl">Numbered fixes (${fixNums.size})</div>`;
  const seen=new Set();
  Object.values(FIXES).flat().sort((a,b)=>a.n-b.n).forEach(f=>{if(seen.has(f.n))return;seen.add(f.n);
    h+=`<div class="fix"><b>#${f.n}</b> ${f.t}</div>`;});
  h+=`<div class="role muted" style="font-size:11.5px;margin-top:12px">Full detail in <code>docs/architecture-map/known-bugs.md</code> + <code>open-items.md</code>.</div>`;
  side.innerHTML=h;
}
function renderIdle(){ activeFilter==='bugs' ? renderBugsSidebar() : renderDefaultSidebar(); }

/* filter chips */
const FILTERS=[
  {id:'overview',label:'Overview'},
  {id:'analytics',label:'Analytics / "why it won"'},
  {id:'oauth-social',label:'OAuth + Sync'},
  {id:'content',label:'Content pipeline'},
  {id:'agents',label:'Agents'},
  {id:'competitor-intel',label:'Competitor Intel'},
  {id:'clients',label:'Clients / Auth'},
  {id:'all',label:'Show all wires'},
  {id:'bugs',label:'Bugs & Roadmap',bugs:true},
];
const chips=document.getElementById('chips');
FILTERS.forEach(f=>{
  const c=document.createElement('div');c.className='chip'+(f.bugs?' bugs':'')+(f.id===activeFilter?' active':'');
  c.textContent=f.label;c.dataset.id=f.id;
  c.onclick=()=>{activeFilter=f.id;document.querySelectorAll('.chip').forEach(x=>x.classList.toggle('active',x.dataset.id===f.id));selected=null;applyFilter();renderIdle();};
  chips.appendChild(c);
});
function applyFilter(){
  const f=activeFilter;
  if(f==='all'){nodeEls.forEach(g=>g.classList.remove('dim'));edgeEls.forEach(el=>el.classList.remove('dim'));return;}
  if(f==='bugs'){
    nodeEls.forEach(g=>g.classList.toggle('dim',!(FIXES[g._node.id]||KNOWN_BUGS[g._node.id])));
    edgeEls.forEach(el=>el.classList.add('dim'));return;
  }
  nodeEls.forEach(g=>g.classList.toggle('dim',!(g._node.tag||[]).includes(f)));
  edgeEls.forEach(el=>{const e=el._edge;el.classList.toggle('dim',!(e.tag||[]).includes(f));});
}

/* pan + zoom */
let tx=0,ty=0,s=1;
function apply(){vp.setAttribute('transform',`translate(${tx},${ty}) scale(${s})`);}
function fit(){
  const pad=60,bb={x:0,y:0,w:1840,h:1010};
  const r=svg.getBoundingClientRect();
  s=Math.min((r.width-pad*2)/bb.w,(r.height-pad*2)/bb.h);s=Math.min(s,1.1);
  tx=(r.width-bb.w*s)/2; ty=(r.height-bb.h*s)/2+10; apply();
}
svg.addEventListener('wheel',ev=>{ev.preventDefault();const r=svg.getBoundingClientRect();
  const mx=ev.clientX-r.left,my=ev.clientY-r.top;const ns=Math.min(2.5,Math.max(.25,s*(ev.deltaY<0?1.1:0.9)));
  tx=mx-(mx-tx)*(ns/s);ty=my-(my-ty)*(ns/s);s=ns;apply();},{passive:false});
let drag=null;
svg.addEventListener('mousedown',ev=>{if(ev.target.closest('.node'))return;drag={x:ev.clientX-tx,y:ev.clientY-ty};svg.classList.add('grabbing');});
window.addEventListener('mousemove',ev=>{if(!drag)return;tx=ev.clientX-drag.x;ty=ev.clientY-drag.y;apply();});
window.addEventListener('mouseup',()=>{drag=null;svg.classList.remove('grabbing');});
svg.addEventListener('click',ev=>{if(!ev.target.closest('.node')){selected=null;applyFilter();renderIdle();}});
document.getElementById('zin').onclick=()=>{s=Math.min(2.5,s*1.15);apply();};
document.getElementById('zout').onclick=()=>{s=Math.max(.25,s*0.87);apply();};
document.getElementById('zfit').onclick=fit;

renderIdle();applyFilter();fit();
</script>
</body>
