*{box-sizing:border-box;margin:0;padding:0}

header{padding:10px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px;flex-wrap:wrap;background:var(--panel)}
header h1{font-size:15px;font-weight:700}
header .sub{color:var(--muted);font-size:11px}
.chips{display:flex;gap:6px;flex-wrap:wrap}
.chip{padding:4px 11px;border-radius:20px;border:1px solid var(--border);background:var(--panel-2);color:var(--muted);cursor:pointer;font-size:11.5px;user-select:none}
.chip.active{background:var(--accent);color:#111;border-color:var(--accent);font-weight:600}
.zoomctl{margin-left:auto;display:flex;gap:6px}
.zoomctl button{width:28px;height:28px;border-radius:6px;border:1px solid var(--border);background:var(--panel-2);color:var(--text);cursor:pointer;font-size:13px}
.zoomctl button.fit{width:auto;padding:0 10px;font-size:11px}
main{flex:1;display:flex;min-height:0}
#canvas{flex:1;cursor:grab;background:radial-gradient(circle at 30% 20%, #141414 0%, #0F0F0F 70%)}
#canvas.dragging{cursor:grabbing}
#sidebar{width:340px;border-left:1px solid var(--border);background:var(--panel);overflow-y:auto;padding:16px;flex-shrink:0}
#sidebar h2{font-size:13px;margin-bottom:6px;color:var(--accent)}
#sidebar h3{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin:14px 0 5px}
#sidebar .path{font-family:ui-monospace,Menlo,monospace;font-size:10.5px;color:var(--client);word-break:break-all;background:var(--panel-2);padding:5px 8px;border-radius:6px;margin:6px 0}
#sidebar p{font-size:12px;color:#c9c9c9;margin-bottom:8px}
#sidebar li{font-size:11.5px;color:#b5b5b5;margin:4px 0 4px 16px}
#sidebar .edgeline{font-size:11px;color:var(--muted);margin:3px 0;padding-left:8px;border-left:2px solid var(--border)}
#sidebar .fix{font-size:11.5px;background:rgba(123,211,137,.09);border:1px solid rgba(123,211,137,.3);border-radius:6px;padding:5px 8px;margin:5px 0;color:#a9e0b3}
#sidebar .bug{font-size:11.5px;border-radius:6px;padding:5px 8px;margin:5px 0}
#sidebar .bug.high{background:rgba(255,56,96,.1);border:1px solid rgba(255,56,96,.4);color:#ff8fa5}
#sidebar .bug.med{background:rgba(245,185,66,.08);border:1px solid rgba(245,185,66,.35);color:#eecf8d}
#sidebar .bug.low{background:rgba(138,138,138,.08);border:1px solid #3a3a3a;color:#a8a8a8}
.legend{display:flex;gap:12px;flex-wrap:wrap;margin-top:10px}
.legend span{font-size:10.5px;color:var(--muted);display:flex;align-items:center;gap:5px}
.legend i{width:14px;height:3px;border-radius:2px;display:inline-block}
svg text{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;user-select:none;pointer-events:none}
.node{cursor:pointer}
.node rect{transition:opacity .15s}
.dim{opacity:.13}
.clusterlabel{fill:#666;font-size:13px;font-weight:700;letter-spacing:.12em}
</style>

    const ct=document.createElementNS(NS,'text'); ct.setAttribute('x',n.x+n.w-14); ct.setAttribute('y',n.y+6); ct.setAttribute('fill','#fff'); ct.setAttribute('font-size','10'); ct.setAttribute('font-weight','700'); ct.setAttribute('text-anchor','middle'); ct.textContent=fx; g.appendChild(ct); bxOff=22; }
  if (bg>0){ const c=document.createElementNS(NS,'circle'); c.setAttribute('cx',n.x+n.w-14-bxOff); c.setAttribute('cy',n.y+2); c.setAttribute('r',9); c.setAttribute('fill','#e03131'); g.appendChild(c);
    const ct=document.createElementNS(NS,'text'); ct.setAttribute('x',n.x+n.w-14-bxOff); ct.setAttribute('y',n.y+6); ct.setAttribute('fill','#fff'); ct.setAttribute('font-size','10'); ct.setAttribute('font-weight','700'); ct.setAttribute('text-anchor','middle'); ct.textContent=bg; g.appendChild(ct); }
  g.addEventListener('click',(ev)=>{ev.stopPropagation(); selected=n.id; applyFilter(); showNode(n);});
  g.addEventListener('mouseenter',()=>{ if(!selected){ highlight(n.id); showNode(n);} });
  g.addEventListener('mouseleave',()=>{ if(!selected){ applyFilter(); showDefault(); } });
  world.appendChild(g);
  return {n,g};
});

/* chips */
const chipsEl = document.getElementById('chips');
CHIPS.forEach(c=>{
  const b = document.createElement('div');
  b.className = 'chip'+(c.id===activeChip?' active':'');
  b.textContent = c.label;
  b.onclick = ()=>{ activeChip=c.id; selected=null; document.querySelectorAll('.chip').forEach(x=>x.classList.remove('active')); b.classList.add('active'); applyFilter(); showDefault(); };
  chipsEl.appendChild(b);
});

function connectedTo(id){
  const s = new Set([id]);
  edges.forEach(e=>{ if(e.from===id) s.add(e.to); if(e.to===id) s.add(e.from); });
  return s;
}
function highlight(id){
  const keep = connectedTo(id);
  nodeEls.forEach(({n,g})=>g.classList.toggle('dim',!keep.has(n.id)));
  edgeEls.forEach(({e,g})=>g.classList.toggle('dim',!(e.from===id||e.to===id)));
}
function applyFilter(){
  if (selected){ highlight(selected); return; }
  if (activeChip==='bugs'){
    nodeEls.forEach(({n,g})=>g.classList.toggle('dim',!((FIXES[n.id]||[]).length||(KNOWN_BUGS[n.id]||[]).length)));
    edgeEls.forEach(({g})=>g.classList.add('dim'));
    return;
  }
  nodeEls.forEach(({n,g})=>g.classList.toggle('dim',!(n.tag||[]).includes(activeChip)));
  edgeEls.forEach(({e,g})=>g.classList.toggle('dim',!(e.tag||[]).includes(activeChip)));
}

/* sidebar */
const sb = document.getElementById('sidebar');
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;');}
function showNode(n){
  const inn = edges.filter(e=>e.to===n.id), out = edges.filter(e=>e.from===n.id);
  let h = `<h2>${esc(n.label)}</h2><div style="color:var(--muted);font-size:11px">${esc(n.sub)}</div>`;
  h += `<div class="path">${esc(n.path||'')}</div>`;
  h += `<p><strong>Role:</strong> ${esc(n.role||'')}</p>`;
  h += `<p><strong>Plain English:</strong> ${esc(n.plain||'')}</p>`;
  if (n.notes && n.notes.length){ h += `<h3>Notes</h3><ul>` + n.notes.map(x=>`<li>${esc(x)}</li>`).join('') + `</ul>`; }
  if ((FIXES[n.id]||[]).length){ h += `<h3>Fixes</h3>` + FIXES[n.id].map(f=>`<div class="fix">#${f.n} — ${esc(f.t)}</div>`).join(''); }
  if ((KNOWN_BUGS[n.id]||[]).length){ h += `<h3>Known bugs</h3>` + KNOWN_BUGS[n.id].map(b=>`<div class="bug ${b.sev}">[${b.sev.toUpperCase()}] ${b.ref?esc(b.ref)+' — ':''}${esc(b.t)}</div>`).join(''); }
  if (inn.length){ h += `<h3>Incoming</h3>` + inn.map(e=>`<div class="edgeline">← ${esc(nodeById[e.from].label)} · ${esc(e.label)}</div>`).join(''); }
  if (out.length){ h += `<h3>Outgoing</h3>` + out.map(e=>`<div class="edgeline">→ ${esc(nodeById[e.to].label)} · ${esc(e.label)}</div>`).join(''); }
  sb.innerHTML = h;
}
function showDefault(){
  sb.innerHTML = `
  <h2>Vantus — 2026-07-04</h2>
  <p>Agency fulfillment + billing OS for Cloud Scenic. ${nodes.length} nodes · ${edges.length} wires · 5 clusters. Red spine = the QC gate flow (the headline feature, verified live 7/3).</p>
  <h3>Notable findings from this map</h3>
  <ul>
    <li><strong>Dead code (3 files):</strong> QuickActionsDashboard, PlaceholderPage, TypingTask — imported at App.jsx:20/25/26, rendered nowhere, shipped in the bundle.</li>
    <li><strong>The QC spine is real and proven:</strong> save → auto qc_review → Drive image fetch → sonnet vision + deterministic price/phone/offer checks → blocked gates in Ledger/modal. 27/31 test checklist green (7/3).</li>
    <li><strong>Two config outages were invisible for weeks:</strong> Drive upload NEVER worked in prod until 7/3 (OAuth origin missing) and ALL email was dead until 7/3 (Resend domain unverified). Neither surfaced an error anywhere a human looked.</li>
    <li><strong>Silent-fallback smell:</strong> _lib/crypto.js stores OAuth tokens in PLAINTEXT if TOKEN_ENC_KEY is unset — same "silently degraded" class as the two outages above.</li>
    <li><strong>Invoice email overlap:</strong> the branded Resend invoice email only sends when Stripe FAILS (BillingRoute.jsx:104-112) — with Stripe live, clients only ever get Stripe's own email.</li>
    <li><strong>status vs stage drift:</strong> approvals advance status but not stage (approvals.js:45-47) — observed diverging live on 7/3.</li>
    <li><strong>Model tiering half-done:</strong> client-facing muse_write_content still on haiku; ideation moved to sonnet; opus only for performance analysis (agent-action.js:1582).</li>
    <li><strong>Mobile audit 7/4:</strong> zero overflow at any viewport (clean layout), but pinch-zoom is disabled app-wide (index.html:5), 8px micro-labels, and Setup has 51-94 tiny tap targets.</li>
  </ul>
  <h3>Legend</h3>
  <div class="legend">
    <span><i style="background:#ff3860"></i>critical spine</span>
    <span><i style="background:#ff7a45"></i>external API</span>
    <span><i style="background:#ffb86b"></i>DB read/write</span>
    <span><i style="background:#4ea1ff"></i>mount/webhook</span>
    <span><i style="background:#555"></i>normal</span>
  </div>
  <h3>Badges</h3>
  <p><span style="color:#51cf66">●</span> fix count · <span style="color:#ff6b6b">●</span> bug count. Use the "Bugs &amp; Roadmap" chip to isolate them. Full punch-list: <span class="path" style="display:inline">docs/architecture-map/open-items.md</span></p>`;
}

/* pan/zoom */
let tx=0, ty=0, s=1, dragging=false, lx=0, ly=0;
function applyT(){ world.setAttribute('transform',`translate(${tx},${ty}) scale(${s})`); }
svg.addEventListener('mousedown',e=>{dragging=true;lx=e.clientX;ly=e.clientY;svg.classList.add('dragging');});
window.addEventListener('mousemove',e=>{ if(!dragging)return; tx+=e.clientX-lx; ty+=e.clientY-ly; lx=e.clientX; ly=e.clientY; applyT(); });
window.addEventListener('mouseup',()=>{dragging=false;svg.classList.remove('dragging');});
svg.addEventListener('wheel',e=>{
  e.preventDefault();
  const rect = svg.getBoundingClientRect();
  const mx = e.clientX-rect.left, my = e.clientY-rect.top;
  const f = e.deltaY<0?1.12:1/1.12;
  tx = mx-(mx-tx)*f; ty = my-(my-ty)*f; s*=f; applyT();
},{passive:false});
svg.addEventListener('click',()=>{ selected=null; applyFilter(); showDefault(); });
function zoomBy(f){ const r=svg.getBoundingClientRect(); const mx=r.width/2,my=r.height/2; tx=mx-(mx-tx)*f; ty=my-(my-ty)*f; s*=f; applyT(); }
function fitView(){ const r=svg.getBoundingClientRect(); const W=1650,H=1290; s=Math.min(r.width/W,r.height/H)*0.96; tx=(r.width-W*s)/2; ty=10; applyT(); }

fitView(); applyFilter(); showDefault();
window.addEventListener('resize',fitView);
</script>
</body>
