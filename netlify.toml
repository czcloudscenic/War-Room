[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "22"

[[redirects]]
  from = "/api/chat"
  to = "/.netlify/functions/chat"
  status = 200

[[redirects]]
  from = "/api/agent-action"
  to = "/.netlify/functions/agent-action"
  status = 200

[[redirects]]
  from = "/api/notify"
  to = "/.netlify/functions/notify"
  status = 200

[[redirects]]
  from = "/api/apify-scrape"
  to = "/.netlify/functions/apify-scrape"
  status = 200

[[redirects]]
  from = "/api/unsplash"
  to = "/.netlify/functions/unsplash"
  status = 200

# Instagram OAuth flow (Meta's Instagram Business Login)
[[redirects]]
  from = "/api/oauth/instagram/start"
  to = "/.netlify/functions/oauth-instagram-start"
  status = 200

[[redirects]]
  from = "/api/oauth/instagram/callback"
  to = "/.netlify/functions/oauth-instagram-callback"
  status = 200

[[redirects]]
  from = "/api/oauth/instagram/deauthorize"
  to = "/.netlify/functions/oauth-instagram-deauthorize"
  status = 200

[[redirects]]
  from = "/api/oauth/instagram/data-deletion"
  to = "/.netlify/functions/oauth-instagram-data-deletion"
  status = 200

[[redirects]]
  from = "/api/sync/instagram"
  to = "/.netlify/functions/sync-instagram"
  status = 200

# TikTok OAuth flow
[[redirects]]
  from = "/api/oauth/tiktok/start"
  to = "/.netlify/functions/oauth-tiktok-start"
  status = 200

[[redirects]]
  from = "/api/oauth/tiktok/callback"
  to = "/.netlify/functions/oauth-tiktok-callback"
  status = 200

[[redirects]]
  from = "/api/oauth/tiktok/deauthorize"
  to = "/.netlify/functions/oauth-tiktok-deauthorize"
  status = 200

[[redirects]]
  from = "/api/oauth/tiktok/data-deletion"
  to = "/.netlify/functions/oauth-tiktok-data-deletion"
  status = 200

[[redirects]]
  from = "/api/sync/tiktok"
  to = "/.netlify/functions/sync-tiktok"
  status = 200

[functions]
  external_node_modules = ["node-fetch"]

[functions."agent-action"]
  timeout = 26

[functions."apify-scrape"]
  timeout = 26

[functions."sync-instagram"]
  timeout = 26

[functions."sync-tiktok"]
  timeout = 26

[[headers]]
  for = "/*"
  [headers.values]
    # Existing
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    # Added 2026-05-26 security sweep
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    # CSP — locked down to the actual origins this app talks to.
    # If a new external service is added (e.g. another Anthropic-style API), update
    # connect-src here. 'unsafe-inline' on style-src is required by inline styled-jsx
    # patterns across the React tree; tighten further when those are factored out.
    # img-src includes data:/blob: for inline previews and the Supabase storage host.
    Content-Security-Policy = "default-src 'self'; script-src 'self' https://accounts.google.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: https://wjcstqqihtebkpyuacop.supabase.co https://images.unsplash.com https://*.cdninstagram.com https://*.fbcdn.net; media-src 'self' https://wjcstqqihtebkpyuacop.supabase.co; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://wjcstqqihtebkpyuacop.supabase.co wss://wjcstqqihtebkpyuacop.supabase.co https://api.anthropic.com https://api.resend.com https://api.tavily.com https://api.apify.com https://cloudscenic.app.n8n.cloud https://hooks.slack.com https://accounts.google.com; frame-ancestors 'self'; frame-src https://accounts.google.com; base-uri 'self'; form-action 'self' https://www.instagram.com https://api.instagram.com"
