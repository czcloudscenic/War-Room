[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[[redirects]]
  from = "/api/chat"
  to = "/.netlify/functions/chat"
  status = 200

[[redirects]]
  from = "/api/agent-action"
  to = "/.netlify/functions/agent-action"
  status = 200

[[redirects]]
  from = "/api/setup"
  to = "/.netlify/functions/setup"
  status = 200

[[redirects]]
  from = "/api/notify"
  to = "/.netlify/functions/notify"
  status = 200

[[redirects]]
  from = "/api/apify-scrape"
  to = "/.netlify/functions/apify-scrape"
  status = 200

[[redirects]]
  from = "/api/cid-scrape"
  to = "/.netlify/functions/cid-scrape"
  status = 200

[[redirects]]
  from = "/api/unsplash"
  to = "/.netlify/functions/unsplash"
  status = 200

[functions]
  external_node_modules = ["node-fetch"]

[functions."apify-scrape"]
  timeout = 26

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
