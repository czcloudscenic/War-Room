            </div>

            {/* ── QUICK ACTIONS ── */}
            <div style={{ marginBottom:44 }}>
              <QuickActionsDashboard />
            </div>

            {/* ── AGENT GRID ── */}
            <div style={{ marginBottom:44 }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"baseline", marginBottom:22 }}>
                <h2 style={{ fontFamily:"'Playfair Display', Georgia, serif", fontSize:26, fontWeight:400, fontStyle:"italic", color:"#1d1d1f", margin:0, letterSpacing:-0.5 }}>The Team</h2>
                <span style={{ fontSize:11, color:"rgba(0,0,0,0.28)", fontWeight:400 }}>8 agents · {liveCount} active</span>
              </div>
              <div style={{ display:"grid", gridTemplateColumns:"repeat(4, 1fr)", gap:12 }}>
                {agents.map(agent => <AgentCard key={agent.id} agent={agent} selected={selectedAgent?.id===agent.id} onClick={() => setSelectedAgent(selectedAgent?.id===agent.id?null:agent)} />)}
              </div>
            </div>

            {/* ── SELECTED AGENT DETAIL ── */}
            {selectedAgent && (
              <div style={{ marginBottom:44, animation:"slideIn 0.2s ease", background:`linear-gradient(135deg, rgba(255,255,255,0.85), rgba(255,255,255,0.7))`, backdropFilter:"blur(24px)", WebkitBackdropFilter:"blur(24px)", borderRadius:20, border:`1px solid ${selectedAgent.color}30`, boxShadow:`0 4px 32px ${selectedAgent.color}15`, padding:"28px 32px" }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:20 }}>
                  <div style={{ display:"flex", alignItems:"center", gap:14 }}>
                    <AgentAvatar agent={selectedAgent} size={44} />
                    <div>
                      <div style={{ fontFamily:"'Playfair Display', Georgia, serif", fontWeight:700, fontStyle:"italic", color:"#1d1d1f", fontSize:22, letterSpacing:-0.5 }}>{selectedAgent.name}</div>
                      <div style={{ fontSize:11, color:selectedAgent.color, fontWeight:500, marginTop:3 }}>{selectedAgent.role} · {selectedAgent.type}</div>
                    </div>
                  </div>
                  <button onClick={() => setSelectedAgent(null)} style={{ background:"rgba(0,0,0,0.04)", border:"none", color:"rgba(0,0,0,0.3)", cursor:"pointer", fontSize:14, borderRadius:10, width:30, height:30, display:"flex", alignItems:"center", justifyContent:"center" }}>✕</button>
                </div>
                <div style={{ display:"flex", flexWrap:"wrap", gap:8 }}>
                  {AGENT_TASKS[selectedAgent.name].slice(0,5).map((t,i) => (
                    <div key={i} style={{ fontSize:11, color:"rgba(0,0,0,0.55)", padding:"6px 12px", background:"rgba(0,0,0,0.04)", borderRadius:20, fontWeight:400 }}>{t}</div>
                  ))}
                </div>
              </div>
            )}

            {/* ── LIVE ACTIVITY ── */}
            <div style={{ marginBottom:44 }}>
              <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:18 }}>
                <h2 style={{ fontFamily:"'Playfair Display', Georgia, serif", fontSize:26, fontWeight:400, fontStyle:"italic", color:"#1d1d1f", margin:0, letterSpacing:-0.5 }}>Live Activity</h2>
                <div style={{ width:5, height:5, borderRadius:"50%", background:"#30d158", animation:"livePulse 2.5s ease-in-out infinite" }} />
              </div>
              <Card style={{ padding:"4px 0", maxHeight:320, overflowY:"auto" }}><ActivityFeed feed={feed} /></Card>
            </div>

            {/* ── OPERATIONS BOARD ── */}
            <div style={{ marginBottom:28 }}>
              <h2 style={{ fontFamily:"'Playfair Display', Georgia, serif", fontSize:22, fontWeight:400, fontStyle:"italic", color:"#1d1d1f", margin:"0 0 18px", letterSpacing:-0.5 }}>Operations</h2>
              <OpsBoard />
            </div>
          </div>
        )}

        {/* AGENTS */}
        {activeNav === "agents" && (
          <AgentChatPage agents={agents} content={content} />
        )}

        {/* INSTAGRAM */}
        {activeNav === "instagram" && (
          <div style={{ animation:"fadeIn 0.4s ease" }}>
            <div style={{ display:"flex", alignItems:"center", gap:14, marginBottom:28 }}>
              <div style={{ width:44, height:44, borderRadius:12, background:"linear-gradient(135deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:22 }}>📸</div>
              <div>
                <h1 style={{ fontFamily:"'Playfair Display', Georgia, serif", fontSize:30, fontWeight:700, color:"#1d1d1f", margin:0, letterSpacing:-1 }}>Instagram</h1>
                <div style={{ fontSize:11, color:"rgba(0,0,0,0.4)", marginTop:2 }}>@vitallyfe · {igItems.length} pieces in pipeline</div>
              </div>
              <div style={{ marginLeft:"auto", display:"flex", alignItems:"center", gap:8, flexWrap:"wrap" }}>
                {["Ready For Copy Creation","Need Copy Approval","Ready For Content Creation","Need Content Approval","Needs Revisions","Approved","Ready For Schedule","Scheduled"].map(s => {
                  const c = STATUS_COLOR[s] || "#999";
                  const n = igItems.filter(x=>x.stage===s).length;
                  if (!n) return null;
                  return <span key={s} style={{ fontSize:9, color:c, background:`${c}15`, padding:"3px 8px", borderRadius:20, fontWeight:600 }}>{s} · {n}</span>;
                })}
                <button onClick={handleAddNew} style={{ background:"#0f0f1a", border:"none", borderRadius:10, color:"#fff", fontSize:12, fontWeight:600, padding:"7px 14px", cursor:"pointer", fontFamily:"Inter, sans-serif", flexShrink:0 }}>+ Add</button>
              </div>
            </div>
            <ContentPipelineBoard title="Reels & Graphics Pipeline" icon="🎬"
              stages={["Ready For Copy Creation","Need Copy Approval","Ready For Content Creation","Need Content Approval","Needs Revisions","Approved","Ready For Schedule","Scheduled"]}
              stageColors={["#f59e0b","#3b82f6","#10b981","#ff453a","#f97316","#30d158","#8b5cf6","#64d2ff"]}
              items={igItems.filter(x => x.type==="reel" || x.type==="graphic")}
              onCardClick={setEditingItem} onMuseWrite={handleMuseWrite}
            />
            <ContentPipelineBoard title="Carousels & Threads" icon="◻"
              stages={["Ready For Copy Creation","Need Copy Approval","Ready For Content Creation","Need Content Approval","Needs Revisions","Approved","Ready For Schedule","Scheduled"]}
              stageColors={["#f59e0b","#3b82f6","#10b981","#ff453a","#f97316","#30d158","#8b5cf6","#64d2ff"]}
              items={igItems.filter(x => x.type==="carousel" || x.type==="thread")}
              onCardClick={setEditingItem} onMuseWrite={handleMuseWrite}
            />
          </div>
        )}

        {/* TIKTOK */}
        {activeNav === "tiktok" && (
          <div style={{ animation:"fadeIn 0.4s ease" }}>
            <div style={{ display:"flex", alignItems:"center", gap:14, marginBottom:28 }}>
              <div style={{ width:44, height:44, borderRadius:12, background:"linear-gradient(135deg,#010101,#ff0050)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:22 }}>♪</div>
              <div>
                <h1 style={{ fontFamily:"'Playfair Display', Georgia, serif", fontSize:30, fontWeight:700, color:"#1d1d1f", margin:0, letterSpacing:-1 }}>TikTok</h1>
                <div style={{ fontSize:11, color:"rgba(0,0,0,0.4)", marginTop:2 }}>@vitallyfe · {ttItems.length} pieces in pipeline</div>
              </div>
            </div>
            <ContentPipelineBoard title="TikTok Pipeline" icon="🎵"
              stages={["Ready For Copy Creation","Need Copy Approval","Ready For Content Creation","Need Content Approval","Needs Revisions","Approved","Ready For Schedule","Scheduled"]}
              stageColors={["#f59e0b","#3b82f6","#10b981","#ff453a","#f97316","#30d158","#8b5cf6","#64d2ff"]}
              items={ttItems}
              onCardClick={setEditingItem} onMuseWrite={handleMuseWrite}
            />
          </div>
        )}

        {/* YOUTUBE */}
        {activeNav === "youtube" && (
          <div style={{ animation:"fadeIn 0.4s ease" }}>
            <div style={{ display:"flex", alignItems:"center", gap:14, marginBottom:28 }}>
              <div style={{ width:44, height:44, borderRadius:12, background:"linear-gradient(135deg,#ff0000,#cc0000)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:22 }}>▷</div>
              <div>
                <h1 style={{ fontFamily:"'Playfair Display', Georgia, serif", fontSize:30, fontWeight:700, color:"#1d1d1f", margin:0, letterSpacing:-1 }}>YouTube</h1>
                <div style={{ fontSize:11, color:"rgba(0,0,0,0.4)", marginTop:2 }}>VitalLyfe · {ytItems.length} pieces · Long-form & Shorts</div>
              </div>
            </div>
            <ContentPipelineBoard title="Production Pipeline" icon="🎬"
              stages={["Ready For Copy Creation","Need Copy Approval","Ready For Content Creation","Need Content Approval","Needs Revisions","Approved","Ready For Schedule","Scheduled"]}
              stageColors={["#f59e0b","#3b82f6","#10b981","#ff453a","#f97316","#30d158","#8b5cf6","#64d2ff"]}
              items={ytItems}
              onCardClick={setEditingItem} onMuseWrite={handleMuseWrite}
            />
          </div>
        )}

        {/* CONTENT TRACKER */}
        {activeNav === "tracker" && (() => {
          const filtered = content.filter(item => {
            if (filterStatus && item.status !== filterStatus) return false;
            if (filterPillar && item.pillar !== filterPillar) return false;
            if (filterPlatform && item.platform !== filterPlatform) return false;
            if (trackerSearch && !item.title.toLowerCase().includes(trackerSearch.toLowerCase())) return false;
            return true;
          });
          const selStyle = { background:"rgba(0,0,0,0.04)", border:"1px solid rgba(0,0,0,0.1)", borderRadius:9, padding:"8px 12px", fontSize:12, color:"#0f0f1a", outline:"none", fontFamily:"Inter, sans-serif", cursor:"pointer", appearance:"none" };
          return (
          <div style={{ animation:"fadeIn 0.4s ease" }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:20 }}>
              <div>
                <h1 style={{ fontFamily:"'Playfair Display', Georgia, serif", fontSize:32, fontWeight:700, color:"#1d1d1f", marginBottom:4, letterSpacing:-1 }}>Content Tracker</h1>
                <p style={{ fontSize:12, color:"rgba(0,0,0,0.4)", margin:0 }}>{filtered.length} of {content.length} pieces · Click any row to edit</p>
              </div>
              <button onClick={handleAddNew} style={{ background:"#0f0f1a", border:"none", borderRadius:12, color:"#fff", fontSize:13, fontWeight:600, padding:"10px 20px", cursor:"pointer", fontFamily:"Inter, sans-serif" }}>+ Add Content</button>
            </div>
            {/* Search + Filter Bar */}
            <div style={{ display:"flex", gap:10, marginBottom:20, flexWrap:"wrap" }}>
              <input value={trackerSearch} onChange={e=>setTrackerSearch(e.target.value)} placeholder="Search by title…"
                style={{ flex:1, minWidth:180, background:"rgba(0,0,0,0.04)", border:"1px solid rgba(0,0,0,0.1)", borderRadius:9, padding:"8px 14px", fontSize:12, color:"#0f0f1a", outline:"none", fontFamily:"Inter, sans-serif" }} />
              <select value={filterStatus} onChange={e=>setFilterStatus(e.target.value)} style={selStyle}>
                <option value="">All Statuses</option>
                {STATUSES.map(s=><option key={s} value={s}>{s}</option>)}
              </select>
              <select value={filterPillar} onChange={e=>setFilterPillar(e.target.value)} style={selStyle}>
                <option value="">All Pillars</option>
                {PILLARS_LIST.map(p=><option key={p} value={p}>{p}</option>)}
              </select>
              <select value={filterPlatform} onChange={e=>setFilterPlatform(e.target.value)} style={selStyle}>
                <option value="">All Platforms</option>
                <option value="instagram">Instagram</option>
                <option value="tiktok">TikTok</option>
                <option value="youtube">YouTube</option>
              </select>
              {(trackerSearch||filterStatus||filterPillar||filterPlatform) && (
                <button onClick={()=>{setTrackerSearch("");setFilterStatus("");setFilterPillar("");setFilterPlatform("");}} style={{ fontSize:11, color:"rgba(0,0,0,0.4)", background:"none", border:"1px solid rgba(0,0,0,0.1)", borderRadius:9, padding:"8px 12px", cursor:"pointer", fontFamily:"Inter, sans-serif" }}>✕ Clear</button>
              )}
            </div>
            <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:14, marginBottom:24 }}>
              <MetricCard label="Total Pieces" value={content.length} delta={0} color="#30d158" />
              <MetricCard label="Approved" value={content.filter(x=>x.status==="Approved").length} delta={0} color="#bf5af2" />
              <MetricCard label="Scheduled" value={content.filter(x=>x.status==="Scheduled").length} delta={0} color="#0a84ff" />
            </div>
            <Card style={{ padding:"0", overflow:"hidden" }}>
              <div style={{ display:"grid", gridTemplateColumns:"2fr 0.7fr 1fr 1fr 1.3fr 0.8fr 0.7fr auto", gap:0, borderBottom:"1px solid rgba(0,0,0,0.07)" }}>
                {["Title","Platform","Campaign","Pillar","Status","Format","Date","Write"].map(h => (
                  <div key={h} style={{ fontSize:9, color:"rgba(0,0,0,0.35)", fontWeight:700, letterSpacing:1.2, textTransform:"uppercase", padding:"12px 14px" }}>{h}</div>
                ))}
              </div>
              {filtered.length === 0 && (
                <div style={{ padding:"32px", textAlign:"center", color:"rgba(0,0,0,0.3)", fontSize:12 }}>No items match your filters.</div>
              )}
              {filtered.map((item, i) => {
                const sc = STATUS_COLOR[item.status] || "#999";
                const ptLabel = item.platform === "instagram" ? "IG" : item.platform === "tiktok" ? "TT" : "YT";
                const ptColor = item.platform === "instagram" ? "#e1306c" : item.platform === "tiktok" ? "#ff0050" : "#ff0000";
                const needsCaption = !item.caption || item.caption.length < 10;
                const needsScript = item.format === "Reel" && (!item.script || item.script.length < 10);
                return (
                  <div key={item.id}
                    style={{ display:"grid", gridTemplateColumns:"2fr 0.7fr 1fr 1fr 1.3fr 0.8fr 0.7fr auto", borderBottom:`1px solid rgba(0,0,0,0.04)`, transition:"background 0.15s", background:i%2===0?"#fff":"rgba(0,0,0,0.01)" }}
                    onMouseEnter={e => e.currentTarget.style.background="#f5f0ff"}
                    onMouseLeave={e => e.currentTarget.style.background=i%2===0?"#fff":"rgba(0,0,0,0.01)"}>
                    <div onClick={() => setEditingItem(item)} style={{ fontSize:12, color:"#0f0f1a", fontWeight:500, padding:"11px 14px", lineHeight:1.3, cursor:"pointer", display:"flex", alignItems:"center", gap:6 }}>
                      {item.client_note && <span title={item.client_note} style={{ fontSize:8, color:"#ff453a", background:"rgba(255,69,58,0.1)", padding:"1px 5px", borderRadius:4, fontWeight:700, whiteSpace:"nowrap" }}>CLIENT NOTE</span>}
                      {item.title}
                    </div>
                    <div style={{ padding:"11px 14px", display:"flex", alignItems:"center" }}>
                      <span style={{ fontSize:10, fontWeight:700, color:ptColor, background:`${ptColor}15`, padding:"2px 7px", borderRadius:6 }}>{ptLabel}</span>
                    </div>
                    <div style={{ fontSize:11, color:"rgba(0,0,0,0.55)", padding:"11px 14px", display:"flex", alignItems:"center" }}>{item.campaign}</div>
                    <div style={{ fontSize:11, color:"rgba(0,0,0,0.55)", padding:"11px 14px", display:"flex", alignItems:"center" }}>{item.pillar}</div>
                    <div style={{ padding:"11px 14px", display:"flex", alignItems:"center" }}>
                      <span style={{ fontSize:9, fontWeight:600, color:sc, background:`${sc}15`, padding:"3px 8px", borderRadius:20, whiteSpace:"nowrap" }}>{item.status}</span>
                    </div>
                    <div style={{ fontSize:11, color:"rgba(0,0,0,0.45)", padding:"11px 14px", display:"flex", alignItems:"center" }}>{item.format}</div>
                    <div style={{ fontSize:10, color:"rgba(0,0,0,0.4)", padding:"11px 10px", display:"flex", alignItems:"center" }}>{item.publish_date || "—"}</div>
                    <div style={{ padding:"8px 12px", display:"flex", alignItems:"center", gap:5 }}>
                      {needsCaption && <button onClick={() => handleMuseWrite(item, "caption")} style={{ fontSize:9, fontWeight:700, color:"#ff375f", background:"rgba(255,55,95,0.08)", border:"1px solid rgba(255,55,95,0.2)", borderRadius:6, padding:"3px 8px", cursor:"pointer", fontFamily:"Inter,sans-serif", whiteSpace:"nowrap" }}>✍️ Cap</button>}
                      {needsScript && <button onClick={() => handleMuseWrite(item, "script")} style={{ fontSize:9, fontWeight:700, color:"#bf5af2", background:"rgba(191,90,242,0.08)", border:"1px solid rgba(191,90,242,0.2)", borderRadius:6, padding:"3px 8px", cursor:"pointer", fontFamily:"Inter,sans-serif", whiteSpace:"nowrap" }}>✍️ Script</button>}
                      {!needsCaption && !needsScript && <span style={{ fontSize:9, color:"#30d158", fontWeight:600 }}>✓</span>}
                    </div>
                  </div>
                );
              })}
            </Card>
          </div>
          );
        })()}

        {/* TASK BOARD */}
        {activeNav === "taskboard" && (
          <div style={{ animation:"fadeIn 0.4s ease" }}>
            <h1 style={{ fontFamily:"'Playfair Display', Georgia, serif", fontSize:32, fontWeight:700, color:"#1d1d1f", marginBottom:6, letterSpacing:-1 }}>Task Board</h1>
            <p style={{ fontSize:12, color:"rgba(0,0,0,0.4)", marginBottom:24 }}>Tasks auto-advance every ~20s · Add tasks to the backlog below</p>
            <OpsBoard />
          </div>
        )}

        {activeNav === "cid" && React.createElement(CIDPage, null)}
        {activeNav === "sales" && <AdROIHub />}
        {activeNav === "chat" && <TeamBroadcast agents={agents} />}
        {activeNav === "artgrid" && <ArtgridScoutPage content={content} />}
        {activeNav === "references" && <ReferencesPage />}

        {/* SKILLS */}
        {activeNav === "skills" && <SkillsPage agents={agents} />}

        {/* SOPs */}
        {activeNav === "sops" && (
          <div style={{ animation:"fadeIn 0.4s ease" }}>
            <div style={{ display:"flex", alignItems:"flex-start", justifyContent:"space-between", marginBottom:28 }}>
              <div>
                <div style={{ fontSize:9, color:"rgba(0,0,0,0.3)", letterSpacing:2, fontWeight:700, textTransform:"uppercase", marginBottom:8 }}>Standard Operating Procedure</div>
                <h1 style={{ fontFamily:"'Playfair Display', Georgia, serif", fontSize:32, fontWeight:700, color:"#1d1d1f", margin:0, letterSpacing:-1 }}>{VITAL_LYFE_SOP.title}</h1>
                <div style={{ fontSize:13, color:"rgba(0,0,0,0.44)", marginTop:5 }}>{VITAL_LYFE_SOP.subtitle} · {VITAL_LYFE_SOP.version}</div>
              </div>
              <Card style={{ padding:"12px 16px", textAlign:"center" }}>
                <div style={{ fontSize:9, color:"rgba(48,209,88,0.6)", fontWeight:700, letterSpacing:1.5, textTransform:"uppercase", marginBottom:4 }}>Agents Trained On</div>
                <div style={{ fontSize:24, fontWeight:700, color:"#30d158" }}>4</div>
                <div style={{ fontSize:9, color:"rgba(0,0,0,0.4)", marginTop:2 }}>Artgrid · Muse · Overseer · Scrappy</div>
              </Card>
            </div>
            <Card style={{ padding:"16px 20px", marginBottom:24, borderLeft:"3px solid #30d158", background:"rgba(48,209,88,0.06)" }}>
              <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                <div style={{ width:6, height:6, borderRadius:"50%", background:"#30d158", animation:"livePulse 2.5s ease-in-out infinite", flexShrink:0 }} />
                <span style={{ fontSize:12, color:"rgba(48,209,88,0.8)", fontWeight:500 }}>Artgrid, Muse, and Overseer have been programmed with this SOP. They understand all 7 steps and operate within this framework automatically.</span>
              </div>
            </Card>
            <div style={{ marginBottom:28 }}>
              <h2 style={{ fontSize:17, fontWeight:600, color:"#1d1d1f", margin:"0 0 16px", letterSpacing:-0.4 }}>Workflow Steps</h2>
              <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
                {VITAL_LYFE_SOP.steps.map((step,i) => {
                  const colors = ["#30d158","#0a84ff","#bf5af2","#ff9f0a","#ff375f","#64d2ff","#ffd60a"];
                  const c = colors[i];
                  return (
                    <Card key={step.num} style={{ padding:"18px 22px", display:"grid", gridTemplateColumns:"52px 1fr", gap:16, alignItems:"flex-start" }}>
                      <div style={{ fontSize:28, fontWeight:800, color:"rgba(0,0,0,0.06)", letterSpacing:-1, lineHeight:1 }}>{step.num}</div>
                      <div>
                        <div style={{ fontSize:9, color:c, fontWeight:700, letterSpacing:1.5, textTransform:"uppercase", marginBottom:4 }}>{step.phase}</div>
                        <div style={{ fontSize:14, fontWeight:600, color:"#0f0f1a", letterSpacing:-0.3, marginBottom:8 }}>{step.title}</div>
                        <div style={{ fontSize:12, color:"rgba(0,0,0,0.48)", lineHeight:1.7, marginBottom:12 }}>{step.desc}</div>
                        <div style={{ display:"flex", flexWrap:"wrap", gap:6 }}>
                          {step.tags.map(tag => <span key={tag} style={{ fontSize:9, color:c, background:`${c}12`, padding:"3px 9px", borderRadius:20, fontWeight:600, border:`1px solid ${c}20` }}>{tag}</span>)}
                        </div>
                      </div>
                    </Card>
                  );
                })}
              </div>
            </div>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:14 }}>
              <Card style={{ padding:"20px" }}>
                <h3 style={{ fontSize:9, fontWeight:700, color:"rgba(0,0,0,0.35)", margin:"0 0 14px", letterSpacing:1.5, textTransform:"uppercase" }}>Tools</h3>
                {VITAL_LYFE_SOP.tools.map((t,i) => (
                  <div key={t} style={{ display:"flex", alignItems:"center", gap:10, marginBottom:10 }}>
                    <div style={{ width:24, height:24, borderRadius:7, background:"rgba(0,0,0,0.04)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:9, color:"rgba(0,0,0,0.4)", fontWeight:700 }}>{String(i+1).padStart(2,"0")}</div>
                    <span style={{ fontSize:12, color:"rgba(0,0,0,0.65)", fontWeight:500 }}>{t}</span>
                  </div>
                ))}
              </Card>
              <Card style={{ padding:"20px" }}>
                <h3 style={{ fontSize:9, fontWeight:700, color:"rgba(0,0,0,0.35)", margin:"0 0 14px", letterSpacing:1.5, textTransform:"uppercase" }}>Platforms</h3>
                {VITAL_LYFE_SOP.platforms.map((p,i) => {
                  const c = ["#e1306c","#ff0050","#ff0000"][i];
                  return (
                    <div key={p} style={{ display:"flex", alignItems:"center", gap:10, marginBottom:10 }}>
                      <div style={{ width:8, height:8, borderRadius:"50%", background:c, flexShrink:0 }} />
                      <span style={{ fontSize:12, color:"rgba(0,0,0,0.65)", fontWeight:500 }}>{p}</span>
                    </div>
                  );
                })}
              </Card>
              <Card style={{ padding:"20px" }}>
                <h3 style={{ fontSize:9, fontWeight:700, color:"rgba(0,0,0,0.35)", margin:"0 0 14px", letterSpacing:1.5, textTransform:"uppercase" }}>Content Pillars</h3>
                {VITAL_LYFE_SOP.contentPillars.map((p,i) => {
                  const c = ["#30d158","#0a84ff","#ff9f0a","#ff375f","#bf5af2"][i];
                  return (
                    <div key={p} style={{ display:"flex", alignItems:"center", gap:10, marginBottom:10 }}>
                      <div style={{ width:8, height:8, borderRadius:2, background:c, flexShrink:0 }} />
                      <span style={{ fontSize:12, color:"rgba(0,0,0,0.65)", fontWeight:500 }}>{p}</span>
                    </div>
                  );
                })}
              </Card>
            </div>
          </div>
        )}

      </div>
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(React.createElement(App));
  </script>
</body>
</html>
