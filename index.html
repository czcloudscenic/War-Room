    // ─── LOGIN SCREEN ─────────────────────────────────────────────────────────
    function LoginScreen({ onLogin }) {
      const [email, setEmail]       = useState("");
      const [password, setPassword] = useState("");
      const [error, setError]       = useState("");
      const [loading, setLoading]   = useState(false);

      const handleLogin = async () => {
        if (!email || !password) { setError("Email and password required."); return; }
        setLoading(true); setError("");
        const { data, error: err } = await sb.auth.signInWithPassword({ email, password });
        if (err) { setError(err.message); setLoading(false); return; }
        // Fetch role from profiles table — fallback to email-based admin check
        const ADMIN_EMAILS = ["cz@cloudscenic.com","dv@cloudscenic.com","ss@cloudscenic.com"];
        const { data: profile } = await sb.from("profiles").select("role").eq("id", data.user.id).single();
        const role = profile?.role || (ADMIN_EMAILS.includes(data.user.email) ? "admin" : "client");
        onLogin(data.user, role);
        setLoading(false);
      };

      const inp = { width:"100%", background:"rgba(255,255,255,0.06)", border:"1px solid rgba(255,255,255,0.1)", borderRadius:10, padding:"12px 14px", fontSize:13, color:"#fff", outline:"none", fontFamily:"Inter, sans-serif", marginBottom:12, boxSizing:"border-box" };

            <div style={{ marginBottom:32 }}>
              <div style={{ fontSize:11, color:"rgba(255,255,255,0.3)", letterSpacing:2, textTransform:"uppercase", fontWeight:700, marginBottom:10 }}>Cloud Scenic</div>
              <h1 style={{ fontSize:24, fontWeight:700, color:"#fff", margin:"0 0 6px", letterSpacing:-0.5 }}>War Room</h1>
              <p style={{ fontSize:12, color:"rgba(255,255,255,0.35)", margin:0 }}>VitalLyfe Content Operations</p>
            </div>
            <div>
              <label style={{ fontSize:9, fontWeight:700, letterSpacing:1.5, textTransform:"uppercase", color:"rgba(255,255,255,0.3)", display:"block", marginBottom:6 }}>Email</label>
              <input style={inp} type="email" value={email} onChange={e=>setEmail(e.target.value)}
                onKeyDown={e=>e.key==="Enter"&&handleLogin()} placeholder="you@email.com" />
              <label style={{ fontSize:9, fontWeight:700, letterSpacing:1.5, textTransform:"uppercase", color:"rgba(255,255,255,0.3)", display:"block", marginBottom:6 }}>Password</label>
              <input style={inp} type="password" value={password} onChange={e=>setPassword(e.target.value)}
                onKeyDown={e=>e.key==="Enter"&&handleLogin()} placeholder="••••••••" />
              {error && <div style={{ fontSize:11, color:"#ff453a", marginBottom:12, padding:"8px 12px", background:"rgba(255,69,58,0.1)", borderRadius:8 }}>{error}</div>}
              <button onClick={handleLogin} disabled={loading}
                style={{ width:"100%", background:loading?"rgba(255,255,255,0.1)":"#fff", color:loading?"rgba(255,255,255,0.3)":"#0a0a0f", border:"none", borderRadius:10, padding:"13px", fontSize:13, fontWeight:700, cursor:loading?"not-allowed":"pointer", fontFamily:"Inter, sans-serif", transition:"all 0.2s" }}>
                {loading ? "Signing in…" : "Sign In"}
              </button>
            </div>
          </div>
        </div>
      );
    }

    // ─── CLIENT VIEW ──────────────────────────────────────────────────────────
    function ClientView({ user, content, setContent, onSignOut, isPreview }) {
      const STATUS_ORDER = ["Need Copy Approval","Need Content Approval","Needs Revisions","Approved","Ready For Schedule","Scheduled"];
      const STATUS_COLOR = {
        "Need Copy Approval":"#3b82f6","Need Content Approval":"#ff453a",
        "Needs Revisions":"#f97316","Approved":"#30d158",
        "Ready For Schedule":"#8b5cf6","Scheduled":"#64d2ff",
        "Ready For Copy Creation":"#f59e0b","Ready For Content Creation":"#10b981",
      };
      const [reviseNote, setReviseNote] = React.useState({});
      const [reviseOpen, setReviseOpen] = React.useState(null);

      const approve = async (item) => {
        const updated = { ...item, status:"Approved", stage:"Approved", client_note:"" };
        setContent(prev => prev.map(x => x.id===item.id ? updated : x));
        await sb.from("content_items").update(updated).eq("id", item.id);
      };
      const revise = async (item) => {
        const note = reviseNote[item.id] || "";
        const updated = { ...item, status:"Needs Revisions", stage:"Needs Revisions", client_note: note };
        setContent(prev => prev.map(x => x.id===item.id ? updated : x));
        await sb.from("content_items").update(updated).eq("id", item.id);
        setReviseOpen(null);
        setReviseNote(prev => ({ ...prev, [item.id]: "" }));
      };

      const pending = content.filter(x => ["Need Copy Approval","Need Content Approval"].includes(x.status));
      const approved = content.filter(x => x.status==="Approved");
      const scheduled = content.filter(x => x.status==="Scheduled");

      return (

            </div>
            <div style={{ marginLeft:"auto", display:"flex", alignItems:"center", gap:12 }}>

              {!isPreview && <button onClick={onSignOut} style={{ fontSize:11, color:"rgba(0,0,0,0.4)", background:"none", border:"1px solid #e5e5e5", borderRadius:8, padding:"5px 12px", cursor:"pointer", fontFamily:"Inter, sans-serif" }}>Sign out</button>}
            </div>
          </div>

          <div style={{ maxWidth:900, margin:"0 auto", padding:"32px 24px" }}>
            {/* Stats */}
            <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:12, marginBottom:32 }}>
              {[["Needs Review", pending.length, "#ff9f0a"], ["Approved", approved.length, "#30d158"], ["Scheduled", scheduled.length, "#64d2ff"]].map(([label,val,color])=>(
                <div key={label} style={{ background:"#fff", border:"1px solid #ebebeb", borderRadius:14, padding:"20px 22px" }}>
                  <div style={{ fontSize:28, fontWeight:700, color, letterSpacing:-1 }}>{val}</div>
                  <div style={{ fontSize:11, color:"rgba(0,0,0,0.4)", fontWeight:600, marginTop:4 }}>{label}</div>
                </div>
              ))}
            </div>

            {/* Needs Review */}
            {pending.length > 0 && (
              <div style={{ marginBottom:32 }}>
                <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:16 }}>
                  <div style={{ width:6, height:6, borderRadius:"50%", background:"#ff9f0a" }} />
                  <h2 style={{ fontSize:15, fontWeight:700, color:"#0f0f1a", margin:0 }}>Needs Your Review</h2>
                  <span style={{ fontSize:10, color:"#ff9f0a", background:"rgba(255,159,10,0.1)", padding:"2px 8px", borderRadius:20, fontWeight:700 }}>{pending.length}</span>
                </div>
                <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
                  {pending.map(item => {
                    const c = STATUS_COLOR[item.status]||"#999";
                    const isRevOpen = reviseOpen === item.id;
                    return (
                      <div key={item.id} style={{ background:"#fff", border:`1px solid ${isRevOpen?"rgba(255,69,58,0.25)":"#ebebeb"}`, borderRadius:14, padding:"18px 20px" }}>
                        <div style={{ display:"flex", alignItems:"center", gap:16 }}>
                          <div style={{ flex:1 }}>
                            <div style={{ fontSize:13, fontWeight:600, color:"#0f0f1a", marginBottom:4 }}>{item.title}</div>
                            <div style={{ fontSize:11, color:"rgba(0,0,0,0.4)", marginBottom:8 }}>{item.campaign} · {item.format}</div>
                            <span style={{ fontSize:9, color:c, background:`${c}15`, padding:"3px 8px", borderRadius:20, fontWeight:700, border:`1px solid ${c}25` }}>{item.status}</span>
                          </div>
                          <div style={{ display:"flex", gap:8, flexShrink:0 }}>
                            <button onClick={()=>setReviseOpen(isRevOpen?null:item.id)} style={{ fontSize:11, fontWeight:600, color:"#ff453a", background:"rgba(255,69,58,0.08)", border:"1px solid rgba(255,69,58,0.2)", borderRadius:8, padding:"7px 14px", cursor:"pointer", fontFamily:"Inter, sans-serif" }}>Request Revisions</button>
                            <button onClick={()=>approve(item)} style={{ fontSize:11, fontWeight:600, color:"#fff", background:"#30d158", border:"none", borderRadius:8, padding:"7px 14px", cursor:"pointer", fontFamily:"Inter, sans-serif" }}>Approve ✓</button>
                          </div>
                        </div>
                        {isRevOpen && (
                          <div style={{ marginTop:14, borderTop:"1px solid rgba(255,69,58,0.1)", paddingTop:14 }}>
                            <div style={{ fontSize:10, color:"rgba(255,69,58,0.7)", fontWeight:600, marginBottom:8 }}>Leave a note for the team (optional)</div>
                            <textarea value={reviseNote[item.id]||""} onChange={e=>setReviseNote(prev=>({...prev,[item.id]:e.target.value}))}
                              placeholder="e.g. The hook needs to be stronger, change the CTA to…"
                              style={{ width:"100%", background:"rgba(255,69,58,0.03)", border:"1px solid rgba(255,69,58,0.2)", borderRadius:8, padding:"10px 12px", fontSize:12, color:"#0f0f1a", fontFamily:"Inter, sans-serif", minHeight:64, outline:"none", resize:"vertical", boxSizing:"border-box" }} />
                            <button onClick={()=>revise(item)} style={{ marginTop:10, fontSize:12, fontWeight:600, color:"#fff", background:"#ff453a", border:"none", borderRadius:8, padding:"8px 20px", cursor:"pointer", fontFamily:"Inter, sans-serif" }}>Send Revision Request</button>
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              </div>
            )}

            {/* All Content */}

                  return (
                    <div key={item.id} style={{ display:"grid", gridTemplateColumns:"1fr auto auto", alignItems:"center", gap:16, padding:"13px 20px", borderBottom:i<content.length-1?"1px solid #f0f0f0":"none" }}>

                        <div style={{ fontSize:10, color:"rgba(0,0,0,0.35)", marginTop:2 }}>{item.campaign} · {item.format}</div>
                      </div>
                      <span style={{ fontSize:9, color:c, background:`${c}12`, padding:"3px 8px", borderRadius:20, fontWeight:700, whiteSpace:"nowrap" }}>{item.status}</span>

                      {!["Need Copy Approval","Need Content Approval"].includes(item.status) && <div style={{width:60}}/>}
                    </div>
                  );
                })}
              </div>
            </div>
          </div>
        </div>
      );

    // ─── ROOT APP WRAPPER ─────────────────────────────────────────────────────
    function App() {
      const [session, setSession] = useState(null);
      const [role, setRole]       = useState(null);
      const [checking, setChecking] = useState(true);
      const [content, setContent] = useState([]);

      useEffect(() => {
        // Check existing session on load
        sb.auth.getSession().then(async ({ data: { session: s } }) => {
          if (s) {
            const ADMIN_EMAILS = ["cz@cloudscenic.com","dv@cloudscenic.com","ss@cloudscenic.com"];
            const { data: profile } = await sb.from("profiles").select("role").eq("id", s.user.id).single();
            const detectedRole = profile?.role || (ADMIN_EMAILS.includes(s.user.email) ? "admin" : "client");
            const { data: items } = await sb.from("content_items").select("*").order("id");
            if (items) setContent(items.map(r => ({ ...r, platforms: r.platforms || [] })));
            setSession(s); setRole(detectedRole);
          }
          setChecking(false);
        });
        sb.auth.onAuthStateChange((_e, s) => { if (!s) { setSession(null); setRole(null); } });
      }, []);

      const handleLogin = async (user, r) => {
        // Load content on fresh login
        if (sb) {
          const { data: items } = await sb.from("content_items").select("*").order("id");
          if (items && items.length > 0) setContent(items.map(row => ({ ...row, platforms: row.platforms || [] })));
        }
        setSession({ user }); setRole(r);
      };
      const handleSignOut = async () => { await sb.auth.signOut(); setSession(null); setRole(null); };

      if (checking) return (
        <div style={{ minHeight:"100vh", background:"#0a0a0f", display:"flex", alignItems:"center", justifyContent:"center" }}>
          <div style={{ width:6, height:6, borderRadius:"50%", background:"#30d158", animation:"livePulse 1.5s ease-in-out infinite" }} />
        </div>
      );
      if (!session) return <LoginScreen onLogin={handleLogin} />;
      if (role === "client") return <ClientView user={session.user} content={content} setContent={setContent} onSignOut={handleSignOut} />;
      return <WarRoom onSignOut={handleSignOut} userEmail={session.user?.email} content={content} setContent={setContent} />;
    }

function useInterval(cb, delay) {
  const cbRef = useRef(cb);
  useEffect(() => { cbRef.current = cb; }, [cb]);
  useEffect(() => {
    if (delay == null) return;
    const id = setInterval(() => cbRef.current(), delay);
    return () => clearInterval(id);
  }, [delay]);
}

// ─── EDIT CONTENT MODAL ───────────────────────────────────────────────────────
function EditContentModal({ item, onSave, onClose, onDelete, onDuplicate, isNew = false }) {
  const [form, setForm] = useState({ ...item });
  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

  // SOP gate validation
  const sopGates = React.useMemo(() => {
    const gates = [];
    const s = form.status;
    const hasCaption = form.caption && form.caption.trim().length > 20;
    const hasFiles   = form.files && form.files.length > 0;
    const hasDate    = !!form.publish_date;
    const isVideo    = ["Reel", "Short", "YouTube"].includes(form.format);

    if (["Need Copy Approval","Ready For Content Creation","Need Content Approval","Approved","Ready For Schedule","Scheduled"].includes(s)) {
      gates.push({ label: "Caption written", ok: hasCaption, hard: false, fix: "Write a caption first (min 20 chars)" });
    }
    if (["Need Content Approval","Approved","Ready For Schedule","Scheduled"].includes(s) && isVideo) {
      gates.push({ label: "Script written", ok: !!(form.script && form.script.trim().length > 20), hard: false, fix: "Write a script before sending to production" });
    }
    if (["Need Content Approval","Approved","Ready For Schedule","Scheduled"].includes(s)) {
      gates.push({ label: "Files attached", ok: hasFiles, hard: false, fix: "Attach content files before approval" });
    }
    if (["Ready For Schedule","Scheduled"].includes(s)) {
      gates.push({ label: "Publish date set", ok: hasDate, hard: true, fix: "Set a publish date before scheduling" });
    }
    return gates;
  }, [form.status, form.caption, form.script, form.files, form.publish_date, form.format]);

  const hardBlocked = sopGates.some(g => g.hard && !g.ok);
  const hasWarnings = sopGates.some(g => !g.ok);
  const togglePlatform = (p) => {
    const cur = form.platforms || [];
    set("platforms", cur.includes(p) ? cur.filter(x => x !== p) : [...cur, p]);
  };

  // ── GOOGLE DRIVE UPLOAD ───────────────────────────────────────────────────
  const GDRIVE_CLIENT_ID = "458336864067-sf7s9meaogm9ltk4qcupv8tu943in6ft.apps.googleusercontent.com";
  const GDRIVE_SCOPE = "https://www.googleapis.com/auth/drive.file";
  const [uploading, setUploading] = useState(false);
  const [uploadMsg, setUploadMsg] = useState("");
  const fileRef = useRef(null);

  const getAccessToken = () => new Promise((resolve, reject) => {
    if (!window.google) { reject(new Error("Google not loaded")); return; }
    const client = window.google.accounts.oauth2.initTokenClient({
      client_id: GDRIVE_CLIENT_ID,
      scope: GDRIVE_SCOPE,
      callback: (resp) => resp.error ? reject(resp) : resolve(resp.access_token),
    });
    client.requestAccessToken({ prompt: "" });
  });

  const handleUpload = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    setUploading(true); setUploadMsg("Connecting to Google…");
    try {
      const token = await getAccessToken();
      setUploadMsg("Uploading to Drive…");

      // Step 1: Initiate resumable upload session
      const initRes = await fetch("https://www.googleapis.com/upload/drive/v3/files?uploadType=resumable&fields=id,name,webViewLink", {
        method: "POST",
        headers: {
          Authorization: `Bearer ${token}`,
          "Content-Type": "application/json",
          "X-Upload-Content-Type": file.type,
          "X-Upload-Content-Length": file.size,
        },
        body: JSON.stringify({ name: `[${form.id}] ${file.name}`, mimeType: file.type }),
      });
      const uploadUrl = initRes.headers.get("Location");
      if (!uploadUrl) throw new Error("Failed to get upload URL");

      // Step 2: Upload the file to the session URL
      const uploadRes = await fetch(uploadUrl, {
        method: "PUT",
        headers: { "Content-Type": file.type, "Content-Length": file.size },
        body: file,
      });
      const data = await uploadRes.json();
      if (data.error) throw new Error(data.error.message);

      // Step 3: Make file viewable by anyone with link
      await fetch(`https://www.googleapis.com/drive/v3/files/${data.id}/permissions`, {
        method: "POST",
        headers: { Authorization: `Bearer ${token}`, "Content-Type": "application/json" },
        body: JSON.stringify({ role: "reader", type: "anyone" }),
      });

      const files = [...(form.files || []), { name: file.name, url: data.webViewLink, driveId: data.id }];
      set("files", files);
      setUploadMsg(`✓ ${file.name} uploaded to Drive`);
    } catch (err) {
      setUploadMsg("Upload failed: " + err.message);
    }
    setUploading(false);
  };

  const removeFile = (f) => set("files", (form.files || []).filter(x => x.driveId !== f.driveId));
  const [previewFile, setPreviewFile] = React.useState(null);
  const getPreviewUrl = (f) => {

    // Google Drive: extract file ID and use embed URL

    if (f.url.includes("drive.google.com") && driveMatch) {
      return `https://drive.google.com/file/d/${f.driveId || driveMatch[0]}/preview`;
    }
    return f.url; // direct URL (Supabase storage etc.)
  };
  const isImage = (f) => /\.(jpg|jpeg|png|gif|webp|svg)$/i.test(f.name);

  return (

}
function TypingTask({ text, color }) {
  const [displayed, setDisplayed] = useState("");
  const [idx, setIdx] = useState(0);
  useEffect(() => { setDisplayed(""); setIdx(0); }, [text]);
  useEffect(() => {
    if (idx >= text.length) return;
    const id = setTimeout(() => { setDisplayed(text.slice(0, idx+1)); setIdx(i => i+1); }, 16 + Math.random()*12);
    return () => clearTimeout(id);
  }, [idx, text]);
  return <span style={{ color, fontSize:11, letterSpacing:0.1 }}>{displayed}{idx < text.length ? <span style={{ animation:"blink 0.7s step-end infinite", color }}>|</span> : null}</span>;
}
function Card({ children, style={}, glowColor, onClick }) {

function OpsBoard() {
  const [ops, setOps] = useState(OPS_INIT);
  const [newTask, setNewTask] = useState("");
  useInterval(() => {
    setOps(prev => {
      if (prev.backlog.length===0) return prev;
      const task = prev.backlog[0];
      return { ...prev, backlog:prev.backlog.slice(1), inProgress:[...prev.inProgress,{ ...task, id:task.id+"_m" }] };
    });
  }, 20000);
  useInterval(() => {
    setOps(prev => {
      if (prev.inProgress.length===0) return prev;
      const task = prev.inProgress[0];
      return { ...prev, inProgress:prev.inProgress.slice(1), completed:[{ ...task, id:task.id+"_d" },...prev.completed].slice(0,8) };
    });
  }, 28000);
  const addTask = () => {
    if (!newTask.trim()) return;
    setOps(prev => ({ ...prev, backlog:[...prev.backlog,{ id:Date.now().toString(), title:newTask, agent:"Unassigned" }] }));
    setNewTask("");

function ArtgridScoutPage({ content }) {
  // SOP Step 03 — scout footage for video formats not yet scheduled or scrapped
  const needsFootage = content.filter(x =>
    ["Reel", "YouTube", "Short"].includes(x.format) &&
    !["Scheduled", "Scrapped"].includes(x.status)
  );
  const [scouts, setScouts] = useState({});
  const [activeId, setActiveId] = useState(null);
  const [scoutingAll, setScoutingAll] = useState(false);
  const [allScoutResult, setAllScoutResult] = useState(null);
  const PILLAR_COLOR = { Education:"#3b82f6", Entertainment:"#10b981", Inspiration:"#8b5cf6", Promotion:"#ff375f", Community:"#f59e0b", Access:"#06b6d4", Abundance:"#8b5cf6", Innovation:"#0a84ff", "Tierra Bomba":"#30d158", "Startup Diaries":"#ff9f0a", "Product Launch":"#ff375f", "Meet the Makers":"#64d2ff" };
  const PRIORITY_COLOR = { HIGH:"#ff375f", MED:"#f59e0b", LOW:"rgba(0,0,0,0.3)" };

  // ── SCOUT ALL via backend action ──────────────────────────────────────────
  const runScoutAll = async () => {
    if (scoutingAll) return;
    setScoutingAll(true);
    setAllScoutResult(null);
    try {
      const res = await fetch("/api/agent-action", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ agentName: "Artgrid", action: "artgrid_scout", payload: {} }),
      });
      const d = await res.json();
      if (d.error) throw new Error(d.error);
      // Merge keyword results into per-item scouts state
      if (d.results && d.results.length > 0) {
        const updates = {};
        d.results.forEach(r => { updates[r.itemId] = { loading: false, keywords: r.keywords, title: r.title }; });
        setScouts(prev => ({ ...prev, ...updates }));
        if (d.results[0]) setActiveId(d.results[0].itemId);
      }
      setAllScoutResult({ ok: true, message: d.message, summary: d.summary });
    } catch(e) {
      setAllScoutResult({ ok: false, message: `❌ Scout failed: ${e.message}` });
    }
    setScoutingAll(false);
  };

  // ── SCOUT SINGLE ITEM via frontend chat proxy ─────────────────────────────
  const runScout = async (item) => {
    setScouts(prev => ({ ...prev, [item.id]: { loading:true, brief:null } }));
    setActiveId(item.id);
    try {
      const systemPrompt = `You are Artgrid — VitalLyfe's AI footage scout for Cloud Scenic's War Room. Expert at finding cinematic stock footage on Artgrid.io.

VitalLyfe visual identity:
- Brand: wellness/hydration technology. Cinematic, calm, purposeful. NEVER corporate.
- Look: warm neutrals, soft light, water in motion, wide open landscapes, macro nature shots
- Emotion: quiet ambition, calm confidence, real human moments — not perfomative
- AVOID: people pointing at whiteboards, fake stock photo smiles, overly corporate setups, cheesy motion graphics, green screen

Artgrid.io search tip: specific descriptive phrases work best. "slow motion water droplet hitting calm surface sunrise" > "water inspiration". Include lighting, environment, motion speed, and subject.

Return ONLY a JSON object (no markdown, no backticks):
{
  "mood": "2-3 sentence visual direction for the editor",
  "pacing": "Fast cuts (under 2s) | Medium (2-4s) | Slow/cinematic (4s+)",
  "clipTypes": ["hero shot description", "b-roll 1", "b-roll 2", "cutaway", "transition"],
  "searches": [
    { "query": "exact artgrid.io search phrase", "use": "specific role in edit timeline", "priority": "HIGH|MED|LOW" }
  ],
  "avoidKeywords": ["search term to avoid"],
  "totalClipsNeeded": 7,
  "notes": "additional editor direction"
}
Include 6-8 search queries. Hyper-specific beats generic every time.`;

      const res = await fetch("/api/chat", {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({
          model:"claude-sonnet-4-20250514",
          max_tokens:1400,
          system:systemPrompt,

        })
      });
      const data = await res.json();
      const text = data.content?.find(b=>b.type==="text")?.text || "{}";
      // Strip any accidental markdown fencing
      const cleaned = text.replace(/```json\s*/g,"").replace(/```\s*/g,"").trim();

      setScouts(prev => ({ ...prev, [item.id]: { loading:false, brief } }));

function CalendarSaveButton({ items }) {
  const [status, setStatus] = React.useState("idle");
  const save = async () => {
    setStatus("saving");
    try {
      const res = await fetch("/api/agent-action", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ action: "muse_save_calendar", payload: { items } }),
      });
      const d = await res.json();
      if (d.error) throw new Error(d.error);
      setStatus("done");
    } catch(e) { setStatus("error"); }
  };
  return (
    <div style={{ marginTop:10 }}>
      {status === "idle" && (
        <button onClick={save} style={{ fontSize:11, fontWeight:700, color:"#ff375f", background:"rgba(255,55,95,0.08)", border:"1px solid rgba(255,55,95,0.25)", borderRadius:10, padding:"8px 16px", cursor:"pointer", fontFamily:"Inter,sans-serif" }}>
          💾 Save {items.length} items to Tracker
        </button>
      )}
      {status === "saving" && <span style={{ fontSize:11, color:"rgba(0,0,0,0.4)" }}>⏳ Saving to tracker…</span>}
      {status === "done" && <span style={{ fontSize:11, color:"#30d158", fontWeight:600 }}>✓ {items.length} items added to tracker — check Content Tracker</span>}
      {status === "error" && <span style={{ fontSize:11, color:"#ff453a" }}>❌ Save failed — check console</span>}
    </div>
  );
}

        display += `\n\n✍️ Fresh Ideas (${d.contentIdeas.length}):\n` + d.summary;
      }
      const calendarItems = (action === "muse_generate_calendar" && d.items?.length > 0) ? d.items : null;
      setHists(h => {
        const thread = (h[sel.id]||[]).filter(m => !m.loading);
        return { ...h, [sel.id]: [...thread, { role: "system", content: display, ts: Date.now(), actionResult: true, calendarItems }] };
      });
    } catch(e) {
      setHists(h => {
        const thread = (h[sel.id]||[]).filter(m => !m.loading);
        return { ...h, [sel.id]: [...thread, { role: "system", content: `❌ Action failed: ${e.message}`, ts: Date.now(), err: true }] };
      });
    }
    setActionBusy(false);
  };

  useEffect(() => {
    if (bottomRef.current) bottomRef.current.scrollIntoView({ behavior: "smooth" });
  }, [hists, sel.id]);

  const sendMsg = async (txt) => {
    const text = (txt !== undefined ? txt : input).trim();
    if (!text || busy) return;
    setInput("");
    const userMsg = { role: "user", content: text, ts: Date.now() };
    const thread = [...msgs, userMsg];
    setHists(h => ({ ...h, [sel.id]: thread }));
    setBusy(true);
    try {
      const ctx = content.length > 0 ? " Pipeline: " + content.slice(0,5).map(c => c.title + "[" + c.stage + "]").join(", ") : "";
      const res = await fetch("/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          system: PROMPTS[sel.name] + ctx,
          messages: thread.map(m => ({ role: m.role === "user" ? "user" : "assistant", content: m.content })),
        }),
      });
      const d = await res.json();
      const blk = d.content && d.content.find(x => x.type === "text");
      setHists(h => ({ ...h, [sel.id]: [...thread, { role: "assistant", content: blk ? blk.text : "No response.", ts: Date.now() }] }));
    } catch(e) {
      setHists(h => ({ ...h, [sel.id]: [...thread, { role: "assistant", content: "Connection error. Try again.", ts: Date.now(), err: true }] }));
    }
    setBusy(false);
    setTimeout(() => { if (inputRef.current) inputRef.current.focus(); }, 80);
  };

  const caps = QUICK[sel.name] || [];

  return (
    <div style={{ animation:"fadeIn 0.4s ease", display:"flex", gap:16, height:"calc(100vh - 80px)" }}>
      <div style={{ width:210, flexShrink:0, display:"flex", flexDirection:"column", gap:6 }}>
        <div style={{ fontSize:10, fontWeight:700, color:"rgba(0,0,0,0.3)", letterSpacing:1.5, textTransform:"uppercase", marginBottom:4 }}>7 Agents</div>
        {agents.map(ag => {
          const active = sel.id === ag.id;
          const chatted = (hists[ag.id] || []).length > 0;
          return (
            <div key={ag.id} onClick={() => setSel(ag)} className="hover-card" style={{ background: active ? ag.color + "18" : "rgba(255,255,255,0.62)", backdropFilter:"blur(16px)", WebkitBackdropFilter:"blur(16px)", border:"1px solid " + (active ? ag.color + "40" : "rgba(255,255,255,0.65)"), borderRadius:14, padding:"11px 13px", cursor:"pointer" }}>
              <div style={{ display:"flex", alignItems:"center", gap:9 }}>
                <AgentAvatar agent={ag} size={34} />
                <div style={{ flex:1, minWidth:0 }}>
                  <div style={{ display:"flex", alignItems:"center", gap:5 }}>

                  </div>
                  <div style={{ fontSize:10, color:ag.color, fontWeight:500, marginTop:1 }}>{ag.role}</div>

                <div style={{ fontSize:9, color:"rgba(0,0,0,0.25)", background:"rgba(0,0,0,0.04)", padding:"2px 6px", borderRadius:20, fontWeight:600 }}>{ag.type}</div>

      <div className="hover-card" style={{ flex:1, display:"flex", flexDirection:"column", background:"rgba(255,255,255,0.92)", border:"1px solid rgba(0,0,0,0.08)", borderRadius:20, overflow:"hidden", boxShadow:"0 4px 24px rgba(0,0,0,0.07)" }}>
        <div style={{ padding:"16px 22px", borderBottom:"1px solid rgba(0,0,0,0.07)", display:"flex", alignItems:"center", gap:13, flexShrink:0 }}>

              <span style={{ fontSize:9, color:"rgba(48,209,88,0.8)", background:"rgba(48,209,88,0.1)", padding:"3px 8px", borderRadius:20, fontWeight:600 }}>LIVE</span>
            </div>
            <div style={{ fontSize:11, color:"rgba(0,0,0,0.4)", marginTop:2 }}>{DESC[sel.name]}</div>
          </div>
          {msgs.length > 0 && <button onClick={() => setHists(h => { const n = { ...h, [sel.id]: [] }; try { const t={}; Object.keys(n).forEach(k=>{t[k]=(n[k]||[]).slice(-10);}); localStorage.setItem("warroom_agent_hists",JSON.stringify(t)); } catch {} return n; })} style={{ background:"none", border:"1px solid rgba(0,0,0,0.1)", borderRadius:8, color:"rgba(0,0,0,0.35)", fontSize:11, cursor:"pointer", padding:"5px 11px", fontFamily:"Inter,sans-serif" }}>Clear</button>}

        {(sel.name === "Sean" || sel.name === "Muse" || sel.name === "Overseer" || sel.name === "Lacey" || sel.name === "Sam" || sel.name === "Artgrid" || sel.name === "Scrappy") && (
          <div style={{ padding:"8px 16px", borderBottom:"1px solid rgba(0,0,0,0.06)", display:"flex", gap:7, flexWrap:"wrap", background:"rgba(0,0,0,0.015)", flexShrink:0 }}>
            {sel.name === "Sean" && (

                style={{ fontSize:11, fontWeight:600, color:"#ff375f", background:"rgba(255,55,95,0.08)", border:"1px solid rgba(255,55,95,0.2)", borderRadius:20, padding:"5px 12px", cursor:actionBusy?"default":"pointer", fontFamily:"Inter,sans-serif", opacity:actionBusy?0.5:1 }}>

            {sel.name === "Artgrid" && (

                style={{ fontSize:11, fontWeight:600, color:"#bf5af2", background:"rgba(191,90,242,0.08)", border:"1px solid rgba(191,90,242,0.2)", borderRadius:20, padding:"5px 12px", cursor:actionBusy?"default":"pointer", fontFamily:"Inter,sans-serif", opacity:actionBusy?0.5:1 }}>
                {actionBusy ? "⏳ Scouting…" : "✦ Scout All Video Items"}
              </button>
            )}
            {sel.name === "Scrappy" && (<>
              <button onClick={() => runAgentAction("scrappy_research")} disabled={actionBusy}
                style={{ fontSize:11, fontWeight:600, color:"#5e5ce6", background:"rgba(94,92,230,0.08)", border:"1px solid rgba(94,92,230,0.2)", borderRadius:20, padding:"5px 12px", cursor:actionBusy?"default":"pointer", fontFamily:"Inter,sans-serif", opacity:actionBusy?0.5:1 }}>
                {actionBusy ? "⏳ Scraping…" : "🕵️ Research Trends"}
              </button>
              <button onClick={() => runAgentAction("scrappy_muse_collab")} disabled={actionBusy}
                style={{ fontSize:11, fontWeight:600, color:"#ff375f", background:"rgba(255,55,95,0.08)", border:"1px solid rgba(255,55,95,0.2)", borderRadius:20, padding:"5px 12px", cursor:actionBusy?"default":"pointer", fontFamily:"Inter,sans-serif", opacity:actionBusy?0.5:1 }}>
                {actionBusy ? "⏳ Collaborating…" : "🕵️✍️ Scrappy × Muse"}
              </button>
            </>)}
          </div>
        )}

        <div style={{ flex:1, overflowY:"auto", padding:"20px 22px", display:"flex", flexDirection:"column", gap:14 }}>
          {msgs.length === 0 && (
            <div style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center" }}>
              <div style={{ width:56, height:56, borderRadius:17, background:sel.grad, border:"2px solid " + sel.color + "40", display:"flex", alignItems:"center", justifyContent:"center", fontSize:22, fontWeight:700, color:sel.color, marginBottom:14 }}>{sel.name[0]}</div>
              <div style={{ fontSize:16, fontWeight:600, color:"#0f0f1a", marginBottom:5 }}>Chat with {sel.name}</div>
              <div style={{ fontSize:12, color:"rgba(0,0,0,0.4)", marginBottom:24, textAlign:"center", maxWidth:280, lineHeight:1.6 }}>Loaded with full VitalLyfe context and SOP knowledge.</div>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, width:"100%", maxWidth:420 }}>
                {caps.map((cap, i) => (
                  <button key={i} onClick={() => sendMsg(cap)} style={{ background:sel.color + "08", border:"1px solid " + sel.color + "25", borderRadius:11, padding:"11px 13px", cursor:"pointer", textAlign:"left", fontFamily:"Inter,sans-serif" }}>
                    <div style={{ fontSize:12, fontWeight:600, color:"#0f0f1a" }}>{cap}</div>

                ))}

          {msgs.map((m, i) => {

              return (
                <div key={i} style={{ borderRadius:14, padding:"12px 16px", background: m.err ? "rgba(255,69,58,0.06)" : "rgba(48,209,88,0.06)", border:"1px solid " + (m.err ? "rgba(255,69,58,0.18)" : "rgba(48,209,88,0.18)"), animation:"slideIn 0.3s ease" }}>
                  <div style={{ display:"flex", alignItems:"center", gap:7, marginBottom:m.loading ? 0 : 8 }}>
                    <div style={{ width:6, height:6, borderRadius:"50%", background: m.err ? "#ff453a" : "#30d158", animation: m.loading ? "livePulse 1s infinite" : "none" }} />
                    <span style={{ fontSize:9, fontWeight:700, letterSpacing:1.2, textTransform:"uppercase", color: m.err ? "#ff453a" : "#30d158" }}>{m.loading ? "Agent Running…" : "Agent Action Result"}</span>
                    <span style={{ fontSize:9, color:"rgba(0,0,0,0.3)", marginLeft:"auto" }}>{new Date(m.ts).toLocaleTimeString([], { hour:"2-digit", minute:"2-digit" })}</span>
                  </div>
                  {!m.loading && <div style={{ fontSize:12, color:"#1a1a2e", lineHeight:1.7, whiteSpace:"pre-wrap", fontFamily:"Inter,sans-serif" }}>{m.content}</div>}
                  {!m.loading && m.calendarItems && m.calendarItems.length > 0 && (
                    <CalendarSaveButton items={m.calendarItems} />
                  )}
                </div>
              );
            }
            // Regular chat messages
            const looksLikeCaption = m.role === "assistant" && sel.name === "Muse" && (m.content.includes("#") || m.content.split("\n").length > 3);
            return (
              <div key={i} style={{ display:"flex", gap:9, flexDirection:m.role === "user" ? "row-reverse" : "row", alignItems:"flex-start" }}>
                {m.role === "assistant" && (
                  <div style={{ width:28, height:28, borderRadius:8, background:sel.grad, border:"1px solid " + sel.color + "40", display:"flex", alignItems:"center", justifyContent:"center", fontSize:11, fontWeight:700, color:sel.color, flexShrink:0, marginTop:2 }}>{sel.name[0]}</div>
                )}
                <div style={{ maxWidth:"76%" }}>
                  <div style={{ background:m.role === "user" ? "#0f0f1a" : m.err ? "rgba(255,69,58,0.07)" : "#f7f7f5", border:m.role === "user" ? "none" : "1px solid " + (m.err ? "rgba(255,69,58,0.18)" : "rgba(0,0,0,0.07)"), borderRadius:m.role === "user" ? "15px 15px 3px 15px" : "3px 15px 15px 15px", padding:"10px 13px" }}>
                    <div style={{ fontSize:13, color:m.role === "user" ? "#fff" : m.err ? "#ff453a" : "#1a1a2e", lineHeight:1.65, whiteSpace:"pre-wrap", fontFamily:"Inter,sans-serif" }}>{m.content}</div>
                    <div style={{ fontSize:9, color:m.role === "user" ? "rgba(255,255,255,0.3)" : "rgba(0,0,0,0.22)", marginTop:4, textAlign:m.role === "user" ? "right" : "left" }}>{new Date(m.ts).toLocaleTimeString([], { hour:"2-digit", minute:"2-digit" })}</div>
                  </div>
                  {looksLikeCaption && (
                    <div style={{ marginTop:6, display:"flex", gap:6 }}>
                      <button onClick={() => { navigator.clipboard.writeText(m.content).catch(()=>{}); }}
                        style={{ fontSize:10, fontWeight:600, color:"#ff375f", background:"rgba(255,55,95,0.08)", border:"1px solid rgba(255,55,95,0.2)", borderRadius:8, padding:"4px 10px", cursor:"pointer", fontFamily:"Inter,sans-serif" }}>
                        📋 Copy Caption
                      </button>
                    </div>
                  )}
                </div>
              </div>
            );
          })}

          {busy && (
            <div style={{ display:"flex", gap:9, alignItems:"flex-start" }}>
              <div style={{ width:28, height:28, borderRadius:8, background:sel.grad, border:"1px solid " + sel.color + "40", display:"flex", alignItems:"center", justifyContent:"center", fontSize:11, fontWeight:700, color:sel.color, flexShrink:0 }}>{sel.name[0]}</div>
              <div style={{ background:"#f7f7f5", border:"1px solid rgba(0,0,0,0.07)", borderRadius:"3px 15px 15px 15px", padding:"11px 15px", display:"flex", gap:4, alignItems:"center" }}>
                <div style={{ width:6, height:6, borderRadius:"50%", background:sel.color, animation:"livePulse 1.2s ease-in-out 0s infinite" }} />
                <div style={{ width:6, height:6, borderRadius:"50%", background:sel.color, animation:"livePulse 1.2s ease-in-out 0.2s infinite" }} />
                <div style={{ width:6, height:6, borderRadius:"50%", background:sel.color, animation:"livePulse 1.2s ease-in-out 0.4s infinite" }} />
              </div>
            </div>
          )}
          <div ref={bottomRef} />
        </div>

        {msgs.length > 0 && (
          <div style={{ padding:"8px 16px", display:"flex", gap:5, flexWrap:"wrap", borderTop:"1px solid rgba(0,0,0,0.05)", flexShrink:0 }}>
            {caps.map((cap, i) => (
              <button key={i} onClick={() => sendMsg(cap)} disabled={busy} style={{ background:sel.color + "08", border:"1px solid " + sel.color + "20", borderRadius:20, padding:"4px 11px", cursor:busy ? "default" : "pointer", fontFamily:"Inter,sans-serif", fontSize:11, fontWeight:500, color:sel.color, opacity:busy ? 0.5 : 1 }}>{cap}</button>
            ))}
          </div>
        )}

        <div style={{ padding:"12px 16px", borderTop:"1px solid rgba(0,0,0,0.07)", display:"flex", gap:9, flexShrink:0 }}>
          <input
            ref={inputRef}
            value={input}
            onChange={e => setInput(e.target.value)}
            onKeyDown={e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMsg(); } }}
            placeholder={"Message " + sel.name + "..."}
            disabled={busy}
            style={{ flex:1, background:"rgba(0,0,0,0.04)", border:"1px solid " + (input ? sel.color + "40" : "rgba(0,0,0,0.1)"), borderRadius:11, padding:"10px 15px", color:"#0f0f1a", fontSize:13, outline:"none", fontFamily:"Inter,sans-serif" }}
          />
          <button
            onClick={() => sendMsg()}
            disabled={!input.trim() || busy}
            style={{ background:input.trim() && !busy ? sel.color : "rgba(0,0,0,0.06)", border:"none", borderRadius:11, color:input.trim() && !busy ? "#fff" : "rgba(0,0,0,0.22)", cursor:input.trim() && !busy ? "pointer" : "default", padding:"10px 18px", fontSize:17, transition:"all 0.2s", fontFamily:"Inter,sans-serif" }}>
            {"\u2191"}
          </button>
        </div>
      </div>
    </div>
  );
}

// ─── QUICK ACTIONS DASHBOARD PANEL ───────────────────────────────────────────
function QuickActionsDashboard() {
  const [busy, setBusy] = useState(false);
  const [activeAction, setActiveAction] = useState(null);
  const [result, setResult] = useState(null);
  const [expanded, setExpanded] = useState(false);

  const ACTIONS = [
    { label: "📋 Morning Briefing", action: "sean_briefing", agent: "Sean", color: "#30d158" },
    { label: "✍️ Generate Captions", action: "muse_generate_calendar", agent: "Muse", color: "#ff375f" },
    { label: "🔍 SOP Scan", action: "overseer_scan", agent: "Overseer", color: "#64d2ff" },
    { label: "⚡ Advance Pipeline", action: "lacey_advance", agent: "Lacey", color: "#ff9f0a" },
    { label: "💊 Health Check", action: "sam_health", agent: "Sam", color: "#ffd60a" },
    { label: "🔗 Trigger n8n", action: "lacey_trigger_n8n", agent: "Lacey", color: "#bf5af2", payload: { workflow: "vitallyfe-pipeline", message: "Triggered from War Room Quick Actions", triggeredBy: "War Room" } },
  ];

  const run = async (action, agent, color, label, payload = {}) => {
    if (busy) return;
    setBusy(true);
    setActiveAction({ action, agent, label, color });
    setResult(null);
    setExpanded(true);
    try {
      const res = await fetch("/api/agent-action", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ agentName: agent, action, payload }),
      });
      const d = await res.json();
      if (d.error) throw new Error(d.error);
      let display = d.message || "Action complete.";
      if (d.briefing) display += "\n\n" + d.briefing;
      if (d.report) display += "\n\n" + d.report;
      if (d.calendar) display += "\n\n" + d.calendar;
      if (d.flagged && d.flagged.length > 0) {
        display += "\n\nFlagged Items:\n" + d.flagged.map(f => `• "${f.title}" — ${f.violation} [${f.severity}]`).join("\n");
      }
      if (d.items && d.items.length > 0) {
        display += "\n\nAdvanced:\n" + d.items.map(i => `• ${i.title}`).join("\n");
      }
      if (d.metrics) {
        const m = d.metrics;
        display += `\n\nMetrics: ${m.total} total · ${m.missingCopy} missing captions · ${m.missingScript} missing scripts`;
        if (m.byStatus) display += "\n" + Object.entries(m.byStatus).map(([s,n]) => `${s}: ${n}`).join(" · ");
      }
      if (d.briefs && d.briefs.length > 0 && d.summary) {
        display += "\n\n" + d.summary;
      }
      setResult({ ok: true, text: display, color });
    } catch(e) {
      setResult({ ok: false, text: `❌ ${e.message}`, color: "#ff453a" });
    }
    setBusy(false);
  };

  return (
    <div style={{ marginBottom:28 }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:14 }}>
        <h2 style={{ fontFamily:"'Playfair Display', Georgia, serif", fontSize:22, fontWeight:400, fontStyle:"italic", color:"#1d1d1f", margin:0, letterSpacing:-0.5 }}>Quick Actions</h2>
        <span style={{ fontSize:11, color:"rgba(0,0,0,0.4)" }}>Agent-powered operations</span>
      </div>
      <div className="hover-card" style={{ background:"rgba(255,255,255,0.92)", border:"1px solid rgba(0,0,0,0.08)", borderRadius:16, overflow:"hidden", boxShadow:"0 2px 12px rgba(0,0,0,0.05)" }}>
        <div style={{ padding:"16px 18px", display:"flex", gap:10, flexWrap:"wrap" }}>
          {ACTIONS.map(({ label, action, agent, color, payload }) => (
            <button key={action} onClick={() => run(action, agent, color, label, payload || {})} disabled={busy} className="glass-btn"
              style={{ fontSize:12, fontWeight:600, color, background:`${color}0d`, border:`1px solid ${color}30`, borderRadius:10, padding:"9px 16px", cursor:busy?"default":"pointer", fontFamily:"Inter,sans-serif", opacity:busy?0.6:1 }}>
              {busy && activeAction?.action === action ? "⏳ Running…" : label}
            </button>
          ))}
        </div>
        {expanded && (
          <div style={{ borderTop:"1px solid rgba(0,0,0,0.06)" }}>
            <div style={{ padding:"10px 18px", display:"flex", justifyContent:"space-between", alignItems:"center", background:"rgba(0,0,0,0.015)" }}>
              <div style={{ display:"flex", alignItems:"center", gap:8 }}>

                </span>
              </div>
              <button onClick={() => { setExpanded(false); setResult(null); setActiveAction(null); }}
                style={{ background:"none", border:"none", color:"rgba(0,0,0,0.3)", cursor:"pointer", fontSize:14, padding:"2px 6px", fontFamily:"Inter,sans-serif" }}>✕</button>

              <div style={{ padding:"14px 18px", maxHeight:320, overflowY:"auto" }}>

              <div style={{ padding:"20px 18px", display:"flex", gap:6, alignItems:"center" }}>

                <div style={{ width:7, height:7, borderRadius:"50%", background:activeAction?.color, animation:"livePulse 1.2s 0.2s infinite" }} />

            )}
          </div>
        )}
      </div>
    </div>
  );
}

// ─── AD ROI HUB ──────────────────────────────────────────────────────────────
function AdROIHub() {
  const [campaigns, setCampaigns] = useState([
    { id:"c1", name:"Drip Campaign — IG Reels", platform:"Instagram", spend:320, leads:18, conversions:4, revenue:1200, status:"Active" },
    { id:"c2", name:"Access is Freedom — TikTok", platform:"TikTok", spend:150, leads:34, conversions:7, revenue:2100, status:"Active" },
    { id:"c3", name:"Product Launch — Multi-Platform", platform:"Meta/TikTok", spend:800, leads:62, conversions:11, revenue:4400, status:"Active" },
    { id:"c4", name:"Meet the Makers — IG Stories", platform:"Instagram", spend:90, leads:9, conversions:1, revenue:350, status:"Paused" },
  ]);
  const [adding, setAdding] = useState(false);
  const [form, setForm] = useState({ name:"", platform:"Instagram", spend:"", leads:"", conversions:"", revenue:"", status:"Active" });
  const [aiInsight, setAiInsight] = useState(null);
  const [analyzing, setAnalyzing] = useState(false);
  const setF = (k,v) => setForm(f=>({...f,[k]:v}));

  const PLATFORMS = ["Instagram","TikTok","Meta/TikTok","YouTube","LinkedIn","X","Reddit"];
  const STATUSES = ["Active","Paused","Ended"];

  const roi = (c) => c.spend > 0 ? (((c.revenue - c.spend) / c.spend) * 100).toFixed(0) : 0;
  const roas = (c) => c.spend > 0 ? (c.revenue / c.spend).toFixed(2) : 0;
  const cpl = (c) => c.leads > 0 ? (c.spend / c.leads).toFixed(2) : 0;
  const cvr = (c) => c.leads > 0 ? ((c.conversions / c.leads) * 100).toFixed(1) : 0;
  const roiColor = (r) => r >= 100 ? "#30d158" : r >= 0 ? "#ff9f0a" : "#ff453a";

  const totalSpend = campaigns.reduce((s,c)=>s+c.spend,0);
  const totalRevenue = campaigns.reduce((s,c)=>s+c.revenue,0);
  const totalLeads = campaigns.reduce((s,c)=>s+c.leads,0);
  const totalConversions = campaigns.reduce((s,c)=>s+c.conversions,0);
  const overallROAS = totalSpend > 0 ? (totalRevenue/totalSpend).toFixed(2) : 0;

  const runAIAnalysis = async () => {
    setAnalyzing(true); setAiInsight(null);
    try {
      const summary = campaigns.map(c=>`${c.name} (${c.platform}): Spend $${c.spend}, Leads ${c.leads}, Conversions ${c.conversions}, Revenue $${c.revenue}, ROI ${roi(c)}%, ROAS ${roas(c)}x, CPL $${cpl(c)}, CVR ${cvr(c)}%`).join("\n");
      const res = await fetch("/api/chat", {
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
          model:"claude-sonnet-4-20250514", max_tokens:800,
          system:"You are Sam, Ad Performance Analyst for VitalLyfe's War Room. Analyze ad campaign data and give sharp, actionable ROI insights. Brand: wellness/hydration tech. Be specific, data-driven, direct. Max 200 words. Lead with what needs to change NOW.",
          messages:[{role:"user",content:`Analyze these ad campaigns:\n${summary}\n\nTotal: Spend $${totalSpend}, Revenue $${totalRevenue}, ROAS ${overallROAS}x, ${totalLeads} leads, ${totalConversions} conversions\n\nGive: (1) What's performing, (2) What's bleeding money, (3) 3 specific optimizations to run this week.`}]
        })
      });
      const d = await res.json(); const blk = d.content?.find(x=>x.type==="text");
      setAiInsight(blk?.text || "Analysis unavailable.");
    } catch(e) { setAiInsight("❌ Analysis failed: " + e.message); }

  const saveCampaign = () => {
    if (!form.name.trim()) return;
    setCampaigns(prev=>[...prev,{...form,id:"c"+Date.now(),spend:Number(form.spend)||0,leads:Number(form.leads)||0,conversions:Number(form.conversions)||0,revenue:Number(form.revenue)||0}]);

  };

  const inp = {width:"100%",border:"1px solid #e5e5e5",borderRadius:8,padding:"10px 12px",fontSize:13,color:"#0f0f1a",outline:"none",fontFamily:"Inter,sans-serif",background:"#fff",boxSizing:"border-box"};
  const labelStyle = {fontSize:9,fontWeight:700,letterSpacing:1.5,textTransform:"uppercase",color:"rgba(0,0,0,0.4)",marginBottom:5,display:"block"};

  return (
    <div style={{animation:"fadeIn 0.4s ease"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:28}}>
        <div>

          <p style={{fontSize:12,color:"rgba(0,0,0,0.4)",margin:0}}>Track spend vs return · AI-powered optimization · Know exactly if $5 in gets $10 out</p>
        </div>
        <div style={{display:"flex",gap:10}}>
          <button onClick={runAIAnalysis} disabled={analyzing} style={{background:analyzing?"rgba(255,214,10,0.1)":"#ffd60a",border:"none",borderRadius:12,color:analyzing?"#ffd60a":"#0a0a0f",cursor:analyzing?"default":"pointer",padding:"10px 20px",fontSize:13,fontWeight:700,fontFamily:"Inter,sans-serif",display:"flex",alignItems:"center",gap:7}}>
            {analyzing?<><div style={{width:7,height:7,borderRadius:"50%",background:"#ffd60a",animation:"livePulse 1s infinite"}}/>Analyzing…</>:"💊 AI Analysis"}
          </button>
          <button onClick={()=>setAdding(true)} style={{background:"#0f0f1a",border:"none",borderRadius:12,color:"#fff",fontSize:13,fontWeight:600,padding:"10px 20px",cursor:"pointer",fontFamily:"Inter,sans-serif"}}>+ Add Campaign</button>
        </div>
      </div>

      {/* ── TOTALS ── */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:12,marginBottom:28}}>
        {[["Total Spend","$"+totalSpend.toLocaleString(),"#ff453a"],["Total Revenue","$"+totalRevenue.toLocaleString(),"#30d158"],["Overall ROAS",overallROAS+"x",overallROAS>=2?"#30d158":overallROAS>=1?"#ff9f0a":"#ff453a"],["Total Leads",totalLeads,"#0a84ff"],["Total Conversions",totalConversions,"#bf5af2"]].map(([label,val,color])=>(
          <Card key={label} style={{padding:"18px 20px"}}>
            <div style={{fontSize:9,fontWeight:700,color:"rgba(0,0,0,0.35)",letterSpacing:1.5,textTransform:"uppercase",marginBottom:8}}>{label}</div>
            <div style={{fontSize:26,fontWeight:700,color,letterSpacing:-1}}>{val}</div>
          </Card>
        ))}
      </div>

      {/* ── AI INSIGHT ── */}
      {aiInsight && (

          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <div style={{width:7,height:7,borderRadius:"50%",background:"#ffd60a"}}/>
              <span style={{fontSize:11,fontWeight:700,color:"#ffd60a",letterSpacing:0.8}}>SAM · AD ANALYSIS</span>
            </div>
            <button onClick={()=>setAiInsight(null)} style={{background:"none",border:"none",color:"rgba(0,0,0,0.3)",cursor:"pointer",fontSize:14}}>✕</button>
          </div>
          <div style={{fontSize:12,color:"rgba(0,0,0,0.7)",lineHeight:1.8,whiteSpace:"pre-wrap"}}>{aiInsight}</div>

        <Card style={{padding:"24px",marginBottom:24,border:"1px solid rgba(0,0,0,0.12)"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
            <h3 style={{fontSize:14,fontWeight:600,color:"#0f0f1a",margin:0}}>New Campaign</h3>
            <button onClick={()=>setAdding(false)} style={{background:"none",border:"none",fontSize:18,color:"rgba(0,0,0,0.35)",cursor:"pointer"}}>×</button>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr",gap:12,marginBottom:12}}>

          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:18}}>
            <div><label style={labelStyle}>Ad Spend ($)</label><input style={inp} type="number" value={form.spend} onChange={e=>setF("spend",e.target.value)} placeholder="500"/></div>
            <div><label style={labelStyle}>Leads</label><input style={inp} type="number" value={form.leads} onChange={e=>setF("leads",e.target.value)} placeholder="24"/></div>
            <div><label style={labelStyle}>Conversions</label><input style={inp} type="number" value={form.conversions} onChange={e=>setF("conversions",e.target.value)} placeholder="6"/></div>
            <div><label style={labelStyle}>Revenue ($)</label><input style={inp} type="number" value={form.revenue} onChange={e=>setF("revenue",e.target.value)} placeholder="2400"/></div>

      <Card style={{padding:"0",overflow:"hidden"}}>

// ─── TEAM BROADCAST ──────────────────────────────────────────────────────────
function TeamBroadcast({ agents }) {
  const [broadcasts, setBroadcasts] = useState([]);
  const [input, setInput] = useState("");
  const [sending, setSending] = useState(false);
  const [expandedId, setExpandedId] = useState(null);
  const bottomRef = useRef(null);
  const inputRef = useRef(null);

  const AGENT_SYSTEM = {
    Sean: "You are Sean, Commander Agent. Decisive, calm, short sentences. When you receive a brief or update from the team lead, acknowledge it, note implications for your pipeline coordination, and state your immediate action. Under 80 words.",
    Lacey: "You are Lacey, Runner Agent. Fast, pragmatic, loves checklists. When you receive a brief, identify what workflows, automations, or SOPs need to be updated or triggered. Under 80 words.",
    Ali: "You are Ali, Developer Agent. Precise, technical. When you receive a brief, flag any technical changes needed to the system. Under 80 words.",
    Sam: "You are Sam, Monitor Agent. Methodical, data-driven. When you receive a brief, note what metrics or signals you'll be watching. Under 80 words.",
    Artgrid: "You are Artgrid, Footage Scout. Visual, cinematic. When you receive a brief, note how it affects your footage scouting strategy. Under 80 words.",
    Muse: "You are Muse, Content Ideation Agent. Creative, on-brand. When you receive a brief, surface 2-3 content angles it suggests. Under 80 words.",
    Overseer: "You are Overseer, SOP Guardian. Rigorous, precise. When you receive a brief, flag any SOP compliance considerations. Under 80 words.",
    Scrappy: "You are Scrappy, Trend Scout. Sharp, fast, a bit chaotic. When you receive a brief, immediately think about what trends or research angles to pursue. Under 80 words.",
  };

  useEffect(() => { if (bottomRef.current) bottomRef.current.scrollIntoView({behavior:"smooth"}); }, [broadcasts]);

  const sendBroadcast = async () => {
    const text = input.trim(); if (!text || sending) return;
    setInput(""); setSending(true);
    const id = Date.now();
    const broadcast = { id, message: text, ts: Date.now(), responses: {}, loading: true };
    setBroadcasts(prev => [...prev, broadcast]);

    // Fire all 8 agents in parallel
    const agentPromises = agents.map(async (agent) => {
      try {
        const res = await fetch("/api/chat", {
          method:"POST", headers:{"Content-Type":"application/json"},
          body: JSON.stringify({
            model:"claude-sonnet-4-20250514", max_tokens:200,
            system: AGENT_SYSTEM[agent.name] || `You are ${agent.name}, an agent in the VitalLyfe War Room. Respond to the brief concisely.`,
            messages:[{role:"user",content:text}]
          })
        });
        const d = await res.json();
        const blk = d.content?.find(x=>x.type==="text");
        return { agentId: agent.id, agentName: agent.name, response: blk?.text || "…", color: agent.color };
      } catch(e) { return { agentId: agent.id, agentName: agent.name, response: "Connection error.", color: agent.color, err:true }; }
    });

    const results = await Promise.all(agentPromises);
    const responses = {};
    results.forEach(r => { responses[r.agentId] = r; });
    setBroadcasts(prev => prev.map(b => b.id===id ? {...b, responses, loading:false} : b));
    setSending(false);
    setExpandedId(id);
    setTimeout(()=>{ if(inputRef.current) inputRef.current.focus(); }, 80);
  };

  const QUICK_BRIEFS = [
    "New campaign brief: we're shifting focus to Tierra Bomba content for the next 3 weeks. Prioritize community and access angles.",
    "Client approved all Drip Campaign reels. We're moving to scheduling phase — all hands on Week 5 Product Launch prep.",
    "Budget update: $500 freed up for paid ads this month. Optimize for highest-converting content.",
    "New platform strategy: doubling down on TikTok. All reels should be adapted for TT-first hook structure.",
  ];

  return (
    <div style={{animation:"fadeIn 0.4s ease",display:"flex",flexDirection:"column",height:"calc(100vh - 80px)"}}>
      <div style={{marginBottom:20}}>
        <h1 style={{fontFamily:"'Playfair Display', Georgia, serif", fontSize:32, fontWeight:700, color:"#1d1d1f", marginBottom:4, letterSpacing:-1}}>Team Broadcast</h1>
        <p style={{fontSize:12,color:"rgba(0,0,0,0.4)",margin:0}}>Send a brief or update to all 8 agents at once — each responds in their own voice and expertise.</p>
      </div>

      <div style={{flex:1,overflowY:"auto",display:"flex",flexDirection:"column",gap:20,paddingBottom:20}}>
        {broadcasts.length === 0 && (
          <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",flex:1,paddingBottom:80}}>
            <div style={{width:48,height:48,borderRadius:14,background:"rgba(0,0,0,0.04)",border:"1px solid rgba(0,0,0,0.08)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,marginBottom:16}}>◷</div>
            <div style={{fontSize:15,fontWeight:600,color:"rgba(0,0,0,0.35)",marginBottom:6}}>No broadcasts yet</div>
            <div style={{fontSize:12,color:"rgba(0,0,0,0.25)",marginBottom:24,textAlign:"center",maxWidth:320,lineHeight:1.6}}>Send a brief, update, or direction below. All 8 agents will respond simultaneously.</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,width:"100%",maxWidth:500}}>
              {QUICK_BRIEFS.map((b,i)=>(
                <button key={i} onClick={()=>setInput(b)} style={{background:"rgba(0,0,0,0.04)",border:"1px solid rgba(0,0,0,0.08)",borderRadius:12,padding:"12px 14px",cursor:"pointer",textAlign:"left",fontFamily:"Inter,sans-serif"}}>
                  <div style={{fontSize:11,fontWeight:600,color:"#0f0f1a",lineHeight:1.4}}>{b.slice(0,60)}…</div>
                </button>
              ))}
            </div>
          </div>
        )}

        {broadcasts.map(b => (
          <div key={b.id} style={{animation:"fadeIn 0.4s ease"}}>
            {/* ── YOUR MESSAGE ── */}
            <div style={{display:"flex",justifyContent:"flex-end",marginBottom:16}}>
              <div style={{maxWidth:"70%",background:"#0f0f1a",borderRadius:"15px 15px 3px 15px",padding:"12px 16px"}}>
                <div style={{fontSize:13,color:"#fff",lineHeight:1.65}}>{b.message}</div>
                <div style={{fontSize:9,color:"rgba(255,255,255,0.3)",marginTop:4,textAlign:"right"}}>{new Date(b.ts).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})}</div>
              </div>
            </div>

            {/* ── AGENT RESPONSES ── */}
            {b.loading ? (
              <div style={{display:"flex",gap:8,alignItems:"center",padding:"12px 16px",background:"rgba(0,0,0,0.03)",borderRadius:12}}>
                {[0,0.2,0.4].map((d,i)=><div key={i} style={{width:7,height:7,borderRadius:"50%",background:"#30d158",animation:`livePulse 1.2s ${d}s infinite`}}/>)}
                <span style={{fontSize:11,color:"rgba(0,0,0,0.4)",marginLeft:6}}>All 8 agents responding…</span>
              </div>
            ) : (
              <div>
                <button onClick={()=>setExpandedId(expandedId===b.id?null:b.id)} style={{background:"none",border:"none",fontSize:11,color:"rgba(0,0,0,0.4)",cursor:"pointer",fontFamily:"Inter,sans-serif",padding:"4px 0",marginBottom:10,display:"flex",alignItems:"center",gap:6}}>
                  <span style={{transform:expandedId===b.id?"rotate(90deg)":"rotate(0deg)",display:"inline-block",transition:"transform 0.2s",fontSize:10}}>▶</span>
                  {Object.keys(b.responses).length} agent responses
                </button>
                {expandedId===b.id && (
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                    {Object.values(b.responses).map(r=>{
                      const ag = agents.find(a=>a.id===r.agentId);
                      return (
                        <Card key={r.agentId} style={{padding:"14px 16px",borderLeft:`3px solid ${r.color}`}}>
                          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                            <div style={{width:26,height:26,borderRadius:7,background:ag?.grad||"#eee",border:`1px solid ${r.color}40`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700,color:r.color,flexShrink:0}}>{r.agentName[0]}</div>
                            <span style={{fontSize:12,fontWeight:600,color:"#0f0f1a"}}>{r.agentName}</span>

function SkillsPage({ agents }) {
  const AGENT_COLORS = { Sean:"#30d158", Lacey:"#ff9f0a", Ali:"#0a84ff", Sam:"#ffd60a", Artgrid:"#bf5af2", Muse:"#ff375f", Overseer:"#64d2ff", Scrappy:"#5e5ce6" };
  const [briefs, setBriefs] = useState(() => {
    try { return JSON.parse(localStorage.getItem("skill_briefs") || "[]"); } catch { return []; }
  });
  const [form, setForm] = useState({ title:"", desc:"", content:"", target:"All Agents" });
  const [expanded, setExpanded] = useState(null);
  const [deploying, setDeploying] = useState(false);
  const [deployedId, setDeployedId] = useState(null);
  const setF = (k,v) => setForm(f=>({...f,[k]:v}));
  const inp = { width:"100%", border:"1px solid rgba(0,0,0,0.1)", borderRadius:10, padding:"10px 14px", fontSize:13, color:"#1d1d1f", outline:"none", fontFamily:"Inter, sans-serif", background:"rgba(255,255,255,0.8)", boxSizing:"border-box" };
  const targetColor = form.target === "All Agents" ? "#30d158" : (AGENT_COLORS[form.target] || "#30d158");
  const TARGETS = ["All Agents", ...agents.map(a => a.name)];

  const deploy = () => {
    if (!form.title.trim() || !form.content.trim() || deploying) return;
    setDeploying(true);
    setTimeout(() => {
      const brief = { id:`brief-${Date.now()}`, ...form, ts:Date.now() };
      const updated = [brief, ...briefs];
      setBriefs(updated);
      try { localStorage.setItem("skill_briefs", JSON.stringify(updated.slice(0,50))); } catch {}
      setDeployedId(brief.id);
      setForm({ title:"", desc:"", content:"", target:"All Agents" });
      setDeploying(false);
      setTimeout(() => setDeployedId(null), 4000);
    }, 1000);
  };

  const deleteBrief = (id) => {
    const updated = briefs.filter(b => b.id !== id);
    setBriefs(updated);
    try { localStorage.setItem("skill_briefs", JSON.stringify(updated)); } catch {}
  };

  return (
    <div style={{ animation:"fadeIn 0.4s ease" }}>
      {/* Header */}
      <div style={{ marginBottom:32 }}>
        <h1 style={{ fontFamily:"'Playfair Display', Georgia, serif", fontSize:32, fontWeight:700, color:"#1d1d1f", marginBottom:4, letterSpacing:-1 }}>Agent Skills</h1>
        <p style={{ fontSize:12, color:"rgba(0,0,0,0.4)", margin:0 }}>Write a skill brief and deploy it to a specific agent or broadcast to all 8. Agents receive it as a capability update.</p>
      </div>

      {/* ── BRIEF BUILDER ── */}
      <Card style={{ padding:"28px 32px", marginBottom:32 }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:22, flexWrap:"wrap", gap:14 }}>
          <div>
            <h2 style={{ fontFamily:"'Playfair Display', Georgia, serif", fontSize:22, fontWeight:400, fontStyle:"italic", color:"#1d1d1f", margin:0, letterSpacing:-0.5 }}>Brief Builder</h2>
            <div style={{ fontSize:11, color:"rgba(0,0,0,0.35)", marginTop:4 }}>Define a skill and deploy it as a capability update</div>
          </div>
          {/* Target selector */}
          <div style={{ display:"flex", alignItems:"center", gap:8, flexWrap:"wrap" }}>
            <span style={{ fontSize:10, color:"rgba(0,0,0,0.4)", fontWeight:600, letterSpacing:0.5, whiteSpace:"nowrap" }}>Deploy to:</span>
            <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
              {TARGETS.map(t => {
                const active = form.target === t;
                const tc = t === "All Agents" ? "#30d158" : (AGENT_COLORS[t] || "#30d158");
                return (
                  <button key={t} onClick={() => setF("target", t)} className="glass-btn"
                    style={{ fontSize:10, fontWeight:600, color: active ? "#fff" : tc, background: active ? tc : `${tc}12`, border:`1px solid ${tc}30`, borderRadius:20, padding:"5px 13px", cursor:"pointer", fontFamily:"Inter,sans-serif", transition:"all 0.15s" }}>
                    {t}
                  </button>
                );
              })}
            </div>
          </div>
        </div>

        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:16, marginBottom:16 }}>
          <div>
            <label style={{ fontSize:9, fontWeight:700, letterSpacing:1.5, textTransform:"uppercase", color:"rgba(0,0,0,0.35)", marginBottom:6, display:"block" }}>Skill Name</label>
            <input style={inp} value={form.title} onChange={e=>setF("title",e.target.value)} placeholder="e.g. Tierra Bomba Context, Hook Mastery v2" />
          </div>
          <div>
            <label style={{ fontSize:9, fontWeight:700, letterSpacing:1.5, textTransform:"uppercase", color:"rgba(0,0,0,0.35)", marginBottom:6, display:"block" }}>Short Description</label>
            <input style={inp} value={form.desc} onChange={e=>setF("desc",e.target.value)} placeholder="What does this skill enable the agent to do?" />
          </div>
        </div>

        <div style={{ marginBottom:22 }}>
          <label style={{ fontSize:9, fontWeight:700, letterSpacing:1.5, textTransform:"uppercase", color:"rgba(0,0,0,0.35)", marginBottom:6, display:"block" }}>Skill Content / Instructions</label>
          <textarea style={{ ...inp, minHeight:160, resize:"vertical", lineHeight:1.75 }}
            value={form.content} onChange={e=>setF("content",e.target.value)}
            placeholder={"Write the full skill brief here — context, rules, examples, and constraints.\n\nAgents will use this as a hardware update when you deploy.\n\nExample:\n• Tierra Bomba is an island off Cartagena, Colombia\n• Community partner: Amigos del Mar\n• Tone for this pillar: documentary, grounded, human\n• Always open with geography before introducing the mission"} />
        </div>

        <div style={{ display:"flex", alignItems:"center", gap:14 }}>
          <button onClick={deploy} disabled={deploying || !form.title.trim() || !form.content.trim()} className="glass-btn"
            style={{ background: (form.title.trim() && form.content.trim()) ? targetColor : "rgba(0,0,0,0.08)", border:"none", borderRadius:12, color: (form.title.trim() && form.content.trim()) ? "#fff" : "rgba(0,0,0,0.25)", padding:"12px 28px", fontSize:13, fontWeight:700, cursor:(form.title.trim()&&form.content.trim()&&!deploying)?"pointer":"default", fontFamily:"Inter,sans-serif", display:"flex", alignItems:"center", gap:8 }}>
            {deploying
              ? <><div style={{ width:7,height:7,borderRadius:"50%",background:"#fff",animation:"livePulse 1s infinite" }} />Deploying…</>
              : `⚡ Deploy to ${form.target}`}
          </button>
          {deployedId && (
            <span style={{ fontSize:12, color:"#30d158", fontWeight:600, animation:"fadeIn 0.3s ease" }}>
              ✓ Brief deployed to {briefs[0]?.target}
            </span>
          )}
        </div>
      </Card>

      {/* ── DEPLOYED BRIEFS LOG ── */}
      {briefs.length > 0 ? (
        <div>
          <h2 style={{ fontFamily:"'Playfair Display', Georgia, serif", fontSize:22, fontWeight:400, fontStyle:"italic", color:"#1d1d1f", margin:"0 0 18px", letterSpacing:-0.5 }}>Deployed Briefs</h2>
          <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
            {briefs.map(brief => {
              const tc = brief.target === "All Agents" ? "#30d158" : (AGENT_COLORS[brief.target] || "#30d158");
              const isOpen = expanded === brief.id;
              const isNew = brief.id === deployedId;
              return (
                <Card key={brief.id} style={{ overflow:"hidden", border: isNew ? `1px solid ${tc}40` : undefined }}>
                  <div onClick={() => setExpanded(isOpen?null:brief.id)} style={{ display:"flex", alignItems:"center", gap:14, padding:"16px 20px", cursor:"pointer" }}>
                    <div style={{ width:36, height:36, borderRadius:10, background:`${tc}15`, border:`1px solid ${tc}25`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:16, flexShrink:0 }}>⚡</div>
                    <div style={{ flex:1, minWidth:0 }}>
                      <div style={{ fontSize:14, fontWeight:600, color:"#1d1d1f", marginBottom:4, letterSpacing:-0.2 }}>{brief.title}</div>
                      <div style={{ display:"flex", gap:6, alignItems:"center", flexWrap:"wrap" }}>
                        <span style={{ fontSize:9, color:tc, background:`${tc}12`, padding:"2px 8px", borderRadius:20, fontWeight:600 }}>{brief.target}</span>
                        {brief.desc && <span style={{ fontSize:10, color:"rgba(0,0,0,0.4)" }}>{brief.desc}</span>}
                      </div>
                    </div>
                    <div style={{ display:"flex", alignItems:"center", gap:10, flexShrink:0 }}>
                      <span style={{ fontSize:9, color:"rgba(0,0,0,0.3)" }}>{new Date(brief.ts).toLocaleDateString("en-US",{month:"short",day:"numeric"})}</span>
                      <button onClick={e=>{e.stopPropagation();deleteBrief(brief.id);}} style={{ background:"none", border:"none", fontSize:11, color:"rgba(0,0,0,0.3)", cursor:"pointer", padding:"4px 8px", borderRadius:6 }}>Delete</button>
                      <span style={{ fontSize:13, color:"rgba(0,0,0,0.3)", transform:isOpen?"rotate(180deg)":"rotate(0deg)", transition:"transform 0.2s", display:"inline-block" }}>▾</span>
                    </div>
                  </div>
                  {isOpen && (
                    <div style={{ padding:"0 20px 20px", borderTop:"1px solid rgba(0,0,0,0.06)" }}>
                      <div style={{ marginTop:14, background:"rgba(0,0,0,0.02)", borderRadius:10, padding:"14px 16px", fontSize:12, color:"rgba(0,0,0,0.65)", lineHeight:1.8, whiteSpace:"pre-wrap", border:"1px solid rgba(0,0,0,0.05)", fontFamily:"Inter, sans-serif" }}>{brief.content}</div>
                    </div>
                  )}
                </Card>
              );
            })}
          </div>
        </div>
      ) : (
        <div style={{ textAlign:"center", padding:"60px 0", opacity:0.35 }}>
          <div style={{ fontSize:48, marginBottom:14 }}>⚡</div>
          <div style={{ fontSize:15, fontWeight:600, color:"#1d1d1f", marginBottom:6 }}>No briefs deployed yet</div>
          <div style={{ fontSize:12, color:"rgba(0,0,0,0.5)" }}>Build your first skill brief above and deploy it to an agent.</div>
        </div>
      )}
    </div>
  );
}

  // Use content from App (shared with ClientView) — fall back to local state only if not passed in
  const [localContent, setLocalContent] = useState(INITIAL_CONTENT);
  const content = contentProp ?? localContent;
  const setContent = setContentProp ?? setLocalContent;
  const [dbStatus, setDbStatus] = useState(DB_CONNECTED ? "connecting" : "offline");

  // ── SUPABASE REALTIME SUBSCRIPTION ───────────────────────────────────────
  // App-level already handles initial load. WarRoom only handles realtime sync + fallback.
  useEffect(() => {
    if (!sb) return;

    // If no content was passed in from App (standalone mode or content not yet loaded), load it ourselves
    if (!contentProp || contentProp.length === 0) {
      sb.from("content_items").select("*").order("id")
        .then(({ data, error }) => {
          if (error) { setDbStatus("error"); return; }
          if (data && data.length > 0) {
            setContent(data.map(r => ({ ...r, platforms: r.platforms || [] })));
          } else {
            sb.from("content_items").insert(INITIAL_CONTENT).then(({ error: e }) => {
              if (!e) setDbStatus("live");
            });
          }
          setDbStatus("live");
        });
    } else {
      setDbStatus("live");
    }

    // Realtime subscription always runs
    const channel = sb.channel("content_changes")
      .on("postgres_changes", { event: "*", schema: "public", table: "content_items" },
        (payload) => {
          if (payload.eventType === "UPDATE") {
            setContent(prev => prev.map(x =>
              x.id === payload.new.id ? { ...payload.new, platforms: payload.new.platforms || [] } : x
            ));
            // Detect client actions and fire notification
            const newStatus = payload.new?.status;
            const oldStatus = payload.old?.status;
            const clientStatuses = ["Approved", "Needs Revisions"];
            if (clientStatuses.includes(newStatus) && newStatus !== oldStatus) {
              const type = newStatus === "Approved" ? "approved" : "revision_requested";
              const notif = {
                id: Date.now(),
                type,
                item: payload.new,
                ts: Date.now(),
                read: false,
              };
              setNotifications(prev => [notif, ...prev].slice(0, 30));
              // Fire n8n webhook via /api/notify
              fetch("/api/notify", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ type, item: payload.new }),
              }).catch(() => {});
            }
          }
          if (payload.eventType === "INSERT") {
            setContent(prev => [...prev, { ...payload.new, platforms: payload.new.platforms || [] }]);
          }
          if (payload.eventType === "DELETE") {
            setContent(prev => prev.filter(x => x.id !== payload.old.id));
          }
        }
      ).subscribe();
    return () => sb.removeChannel(channel);
  }, []);
  const [editingItem, setEditingItem] = useState(null);

  const feedIdRef = useRef(0);

  });

    return `${d.getHours().toString().padStart(2,"0")}:${d.getMinutes().toString().padStart(2,"0")}:${d.getSeconds().toString().padStart(2,"0")}`;

      const x = Math.max(0, Math.min(window.innerWidth - 300, clientX - notifDragOffset.current.x));

      setNotifPos({ x, y });
    };
    const onUp = () => { notifDragging.current = false; };
    document.addEventListener("mousemove", onMove);
    document.addEventListener("mouseup", onUp);
    document.addEventListener("touchmove", onMove, { passive: false });
    document.addEventListener("touchend", onUp);
    return () => {
      document.removeEventListener("mousemove", onMove);
      document.removeEventListener("mouseup", onUp);
      document.removeEventListener("touchmove", onMove);
      document.removeEventListener("touchend", onUp);

    const item = { ...updated, stage: updated.status, platform: primaryPlatform, type: itemType };

    if (isNewItem) {

      }

      setContent(prev => prev.map(x => x.id === item.id ? item : x));
      if (sb) {
        sb.from("content_items").update(item).eq("id", item.id)

    setIsNewItem(false);
  };

      title: `Copy of ${item.title}`,
      status: "Ready For Copy Creation",
      stage: "Ready For Copy Creation",
      caption: "",
      script: "",
      publish_date: "",
      client_note: "",
      files: [],
    };
    setContent(prev => [...prev, copy]);
    setEditingItem(null);
    setIsNewItem(false);
    if (sb) {
      sb.from("content_items").insert(copy)
        .then(({ error }) => { if (error) console.warn("Supabase duplicate error:", error.message); });
    }
  };

      const res = await fetch("/api/agent-action", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          action: "muse_write_content",
          payload: { itemId: item.id, itemTitle: item.title, pillar: item.pillar, format: item.format, description: item.description, fieldToUpdate: field },
        }),
      });
      const d = await res.json();
      if (d.error) throw new Error(d.error);
      // Update local content state
      setContent(prev => prev.map(x => x.id === item.id ? { ...x, [field]: d.content } : x));
